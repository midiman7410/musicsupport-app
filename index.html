<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Admin - Fix Upload V 0.0.071</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --main-orange: #ff6600; --soft-orange: #fff5ed; }
        body { background: #fdfdfd; padding: 10px; font-family: 'Sarabun', sans-serif; padding-bottom: 60px; }
        
        /* Version Tag */
        .v-badge { position: fixed; top: 10px; right: 10px; background: var(--main-orange); color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.65rem; z-index: 9999; font-weight: bold; }

        /* Tabs Navigation */
        .nav-pills { justify-content: center; background: #eee; border-radius: 50px; padding: 5px; margin: 15px 0; }
        .nav-link { border-radius: 40px !important; color: #555; font-weight: 600; font-size: 0.9rem; }
        .nav-link.active { background-color: var(--main-orange) !important; color: white !important; }

        /* Student Grid (Small Cards) */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 10px; }
        .std-card { background: white; border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .std-photo { width: 65px; height: 65px; background: #f5f5f5; border-radius: 50%; margin: 0 auto 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .std-photo img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-upload-small { background: #fff; border: 1px solid var(--main-orange); color: var(--main-orange); font-size: 0.7rem; padding: 3px 8px; border-radius: 8px; font-weight: 600; transition: 0.2s; width: 100%; margin-top: 5px; }
        .btn-upload-small:active { background: var(--main-orange); color: white; }

        /* Teacher View */
        .teacher-box { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 5px solid #007bff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* Timetable Grid */
        .table-responsive { background: white; border-radius: 12px; border: 1px solid #dee2e6; }
        .table-timetable { min-width: 900px; margin-bottom: 0; }
        .th-day { width: 90px; background: #fff5ed !important; color: var(--main-orange); font-weight: bold; vertical-align: middle !important; text-align: center; }
        .class-box { background: #fff; border: 1px solid #ffccaa; border-left: 3px solid var(--main-orange); border-radius: 6px; padding: 5px; margin-bottom: 5px; text-align: left; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="v-badge">V 0.0.071</div>

<div class="container-fluid">
    <h3 class="text-center fw-bold mt-3" style="color:var(--main-orange)">🟠 MUSIC SCHOOL</h3>
    
    <ul class="nav nav-pills nav-fill">
        <li class="nav-item"><button id="navStudent" class="nav-link active" onclick="switchPage('student')">นักเรียน</button></li>
        <li class="nav-item"><button id="navTeacher" class="nav-link" onclick="switchPage('teacher')">คุณครู</button></li>
        <li class="nav-item"><button id="navSchedule" class="nav-link" onclick="switchPage('schedule')">ตารางเรียน</button></li>
    </ul>

    <div id="searchBox" class="mb-3"><input type="text" id="searchInput" class="form-control" placeholder="🔍 ค้นหาชื่อ..." onkeyup="handleSearch()" style="border-radius: 20px;"></div>
    
    <div id="displayArea"></div>
</div>

<script>
    const apiUrl = 'https://script.google.com/macros/s/AKfycbwNLW9rMRdeq82LaLCrP5PCyxj0Sz-GFcnD1hs4ZG6AviyV7NpH6mWNIBLGN7NVCEvf/exec';
    let allStudents = [], allTeachers = [], currentPage = 'student';

    async function loadData() {
        try {
            const res = await fetch(`${apiUrl}?t=${new Date().getTime()}`, { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            allStudents = data.students || [];
            allTeachers = data.teachers || [];
            renderDisplay();
        } catch (e) { document.getElementById('displayArea').innerHTML = 'โหลดข้อมูลไม่สำเร็จ'; }
    }

    function renderDisplay(data = null) {
        const area = document.getElementById('displayArea');
        const listData = data || (currentPage === 'student' ? allStudents : allTeachers);
        area.innerHTML = '';

        if (currentPage === 'schedule') {
            renderScheduleGrid(area);
            return;
        }

        if (currentPage === 'teacher') {
            renderTeacherList(area);
            return;
        }

        // หน้าลิตส์นักเรียน (Grid Mode)
        let html = '<div class="main-grid">';
        listData.forEach(item => {
            const v = Object.values(item);
            const img = v[18] && v[18].toString().startsWith('data:image') ? `<img src="${v[18]}">` : '👤';
            html += `
            <div class="std-card">
                <div class="std-photo">${img}</div>
                <div class="fw-bold" style="font-size:0.9rem; color:#333;">${v[2]}</div>
                <div class="text-orange small fw-bold">เหลือ ${v[16] || 0} ชม.</div>
                <label class="btn-upload-small">📷 อัปรูป<input type="file" hidden accept="image/*" onchange="handleUpload(this, '${v[0]}')"></label>
            </div>`;
        });
        area.innerHTML = html + '</div>';
    }

    function renderTeacherList(container) {
        let html = '';
        allTeachers.forEach(t => {
            const v = Object.values(t);
            html += `
            <div class="teacher-box d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="fw-bold mb-0">ครู${v[2]}</h6>
                    <small class="text-muted">คลิกเพื่อเช็กชื่อนักเรียน</small>
                </div>
                <button class="btn btn-primary btn-sm rounded-pill" onclick="viewTeacherStudents('${v[0]}', '${v[2]}')">ดูเด็ก</button>
            </div>`;
        });
        container.innerHTML = html;
    }

    function renderScheduleGrid(container) {
        const timeSlots = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00'];
        const days = ['จันทร์', 'อังคาร', 'พฤหัสบดี', 'ศุกร์', 'เสาร์', 'อาทิตย์'];
        let html = '<div class="table-responsive"><table class="table table-timetable"><thead><tr><th class="th-day">วัน/เวลา</th>';
        timeSlots.forEach(t => html += `<th class="text-center bg-orange text-white" style="font-size:0.75rem; background: #ff6600 !important; color:white;">${t}</th>`);
        html += '</tr></thead><tbody>';
        days.forEach(day => {
            html += `<tr><td class="th-day">วัน${day}</td>`;
            timeSlots.forEach(slot => {
                const matches = allStudents.filter(s => (Object.values(s)[14] || "").includes(day) && (Object.values(s)[15] || "").startsWith(slot.split(':')[0]));
                html += '<td>';
                matches.forEach(m => {
                    const v = Object.values(m);
                    const teacher = allTeachers.find(tc => Object.values(tc)[0] == v[19]);
                    html += `<div class="class-box"><span class="fw-bold d-block">${v[2]}</span><small class="text-muted">ครู${teacher ? Object.values(teacher)[2] : '?'}</small></div>`;
                });
                html += '</td>';
            });
            html += '</tr>';
        });
        container.innerHTML = html + '</tbody></table></div>';
    }

    function switchPage(p) {
        currentPage = p;
        document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav${p.charAt(0).toUpperCase() + p.slice(1)}`).classList.add('active');
        document.getElementById('searchBox').style.display = (p === 'schedule') ? 'none' : 'block';
        renderDisplay();
    }

    function handleSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const data = (currentPage === 'student' ? allStudents : allTeachers);
        renderDisplay(data.filter(s => Object.values(s).join(' ').toLowerCase().includes(term)));
    }

    async function handleUpload(input, id) {
        const file = input.files[0]; if (!file) return;
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas'); canvas.width = 400; canvas.height = 400;
