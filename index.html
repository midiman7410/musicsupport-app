<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Support Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script> <style>
        body { background: #f8f9fa; padding: 20px; font-family: sans-serif; }
        .student-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #reader { width: 100%; max-width: 400px; margin: 0 auto 20px auto; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>
    <h2 class="mb-4">🎸 Music Support</h2>
    
    <div id="reader"></div>

    <div id="studentList">กำลังโหลดข้อมูลนักเรียน...</div>

    <script>
        const apiUrl = 'https://script.google.com/macros/s/AKfycbxRuPu8O8Px_LfOiHvP3uTijX_BtmPDZUbwN48S_25sXSxxlvwbH0Z64O0cKW9wkvHu/exec';

        async function loadData() {
            try {
                const response = await fetch(apiUrl);
                const students = await response.json();
                let html = '';
                students.forEach(s => {
                    html += `
                        <div class="student-card">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h5 class="mb-0">${s['ชื่อเล่น'] || 'ไม่ระบุชื่อ'}</h5>
                                    <small class="text-muted">รหัส: ${s['รหัสนักเรียน'] || '-'}</small>
                                </div>
                                <button class="btn btn-primary btn-sm" onclick="checkIn('${s['รหัสนักเรียน']}')">เช็คชื่อ</button>
                            </div>
                        </div>`;
                });
                document.getElementById('studentList').innerHTML = html;
            } catch (error) {
                document.getElementById('studentList').innerHTML = '❌ โหลดข้อมูลไม่สำเร็จ';
            }
        }

        // ฟังก์ชันเมื่อสแกนเจอ QR
        function onScanSuccess(decodedText) {
            alert("สแกนสำเร็จ! รหัสนักเรียนคือ: " + decodedText);
            // ในอนาคตเราจะเขียนโค้ดส่งรหัสนี้ไปตัดชั่วโมงใน Sheet ครับ
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        loadData();
    </script>
</body>
</html><!DOCTYPE html>
