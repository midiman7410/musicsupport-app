<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Admin - Teacher System V 0.0.070</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --main-orange: #ff6600; --teacher-blue: #007bff; }
        body { background: #f8f9fa; font-family: 'Sarabun', sans-serif; padding-bottom: 80px; }
        .v-badge { position: fixed; top: 10px; right: 10px; background: var(--main-orange); color: white; padding: 2px 12px; border-radius: 20px; font-size: 0.7rem; z-index: 9999; }
        
        /* Navigation */
        .nav-pills { background: #eee; border-radius: 50px; padding: 5px; margin: 15px; }
        .nav-link.active { background-color: var(--main-orange) !important; }

        /* Teacher View Styles */
        .teacher-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--teacher-blue); cursor: pointer; transition: 0.2s; }
        .teacher-card:active { transform: scale(0.98); }
        
        .student-item { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-check-in { background: var(--main-orange); color: white; border-radius: 8px; border: none; padding: 8px 15px; font-weight: bold; width: 100%; margin-top: 10px; }
        
        .history-tag { font-size: 0.75rem; color: #666; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 5px; }
        
        /* Table Styles (จาก V เดิม) */
        .table-responsive { background: white; border-radius: 12px; border: 1px solid #dee2e6; margin: 15px; }
        .table-timetable { min-width: 900px; margin-bottom: 0; }
        .th-day { background: #fff5ed !important; color: var(--main-orange); width: 90px; text-align: center; vertical-align: middle; }
        .class-box { background: #fff; border: 1px solid #ffccaa; border-left: 3px solid var(--main-orange); border-radius: 6px; padding: 5px; margin-bottom: 5px; text-align: left; }
    </style>
</head>
<body>

<div class="v-badge">V 0.0.070</div>

<div id="mainApp">
    <div class="container-fluid">
        <h3 class="text-center fw-bold mt-3" style="color:var(--main-orange)">🟠 MUSIC SCHOOL</h3>
        
        <ul class="nav nav-pills nav-fill" id="topNav">
            <li class="nav-item"><button class="nav-link active" onclick="switchPage('student')">นักเรียน</button></li>
            <li class="nav-item"><button class="nav-link" onclick="switchPage('teacher')">คุณครู</button></li>
            <li class="nav-item"><button class="nav-link" onclick="switchPage('schedule')">ตารางเรียน</button></li>
        </ul>

        <div id="contentArea">
            <div class="text-center p-5 text-muted">กำลังโหลดข้อมูล...</div>
        </div>
    </div>
</div>

<script>
    const apiUrl = 'https://script.google.com/macros/s/AKfycbwNLW9rMRdeq82LaLCrP5PCyxj0Sz-GFcnD1hs4ZG6AviyV7NpH6mWNIBLGN7NVCEvf/exec';
    let allStudents = [], allTeachers = [], currentPage = 'student';

    async function loadData() {
        try {
            const res = await fetch(`${apiUrl}?t=${new Date().getTime()}`, { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            allStudents = data.students || [];
            allTeachers = data.teachers || [];
            renderPage();
        } catch (e) { Swal.fire('Error', 'โหลดข้อมูลไม่สำเร็จ', 'error'); }
    }

    function switchPage(p) {
        currentPage = p;
        document.querySelectorAll('.nav-link').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(p === 'student' ? 'นักเรียน' : p === 'teacher' ? 'คุณครู' : 'ตารางเรียน'));
        });
        renderPage();
    }

    function renderPage() {
        const area = document.getElementById('contentArea');
        if (currentPage === 'student') renderStudentList(area);
        else if (currentPage === 'teacher') renderTeacherList(area);
        else if (currentPage === 'schedule') renderScheduleGrid(area);
    }

    // 1. หน้าคุณครู (เลือกครู)
    function renderTeacherList(container) {
        let html = '<div class="px-2">';
        allTeachers.forEach(t => {
            const v = Object.values(t);
            html += `
            <div class="teacher-card" onclick="viewTeacherDashboard('${v[0]}', '${v[2]}')">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-0 fw-bold">ครู${v[2]}</h5>
                        <small class="text-muted">คลิกเพื่อดูนักเรียนและเช็กชื่อ</small>
                    </div>
                    <span class="badge bg-primary rounded-pill">สอน ${allStudents.filter(s => Object.values(s)[19] == v[0]).length} คน</span>
                </div>
            </div>`;
        });
        container.innerHTML = html + '</div>';
    }

    // 2. หน้า Dashboard ของครูแต่ละคน
    function viewTeacherDashboard(tId, tName) {
        const myStudents = allStudents.filter(s => Object.values(s)[19] == tId);
        let html = `
        <div class="px-2">
            <button class="btn btn-sm btn-outline-secondary mb-3" onclick="switchPage('teacher')">← กลับหน้าหลัก</button>
            <h4 class="fw-bold mb-3">สวัสดีครับ ครู${tName}</h4>
            <p class="text-muted">นักเรียนในความดูแลของท่าน:</p>
        `;
        
        myStudents.forEach(s => {
            const v = Object.values(s);
            html += `
            <div class="student-item">
                <div class="d-flex justify-content-between">
                    <span class="fw-bold" style="font-size:1.1rem;">${v[2]}</span>
                    <span class="badge ${v[16] <= 2 ? 'bg-danger' : 'bg-success'}">เหลือ ${v[16] || 0} ชม.</span>
                </div>
                <div class="text-muted small">${v[8]} | วัน${v[14]} ${v[15]}น.</div>
                <button class="btn-check-in" onclick="openCheckInModal('${v[0]}', '${v[2]}')">เช็กชื่อ / บันทึกการสอน</button>
            </div>`;
        });
        
        document.getElementById('contentArea').innerHTML = html + '</div>';
    }

    // 3. ฟังก์ชันเช็กชื่อและหักชั่วโมง
    async function openCheckInModal(sId, sName) {
        const { value: formValues } = await Swal.fire({
            title: `บันทึกการสอน: ${sName}`,
            html:
                '<label class="text-start d-block small">สอนถึงไหน (บทที่/หน้า):</label>' +
                '<input id="swal-lesson" class="swal2-input" placeholder="เช่น บทที่ 5 หน้า 20">' +
                '<label class="text-start d-block small mt-3">การบ้าน:</label>' +
                '<input id="swal-hw" class="swal2-input" placeholder="เช่น ฝึกสเกล C Major">',
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: 'บันทึกและหัก 1 ชม.',
            confirmButtonColor: '#ff6600',
            preConfirm: () => {
                return {
                    lesson: document.getElementById('swal-lesson').value,
                    homework: document.getElementById('swal-hw').value
                }
            }
        });

        if (formValues) {
            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'checkIn',
                        studentId: sId,
                        lesson: formValues.lesson,
                        homework: formValues.homework
                    })
                });
                
                Swal.fire({ icon: 'success', title: 'บันทึกเรียบร้อย!', text: 'หักชั่วโมงเรียนแล้ว 1 ชม.', timer: 2000 });
                loadData(); // โหลดข้อมูลใหม่เพื่ออัปเดตยอดคงเหลือ
            } catch (err) {
                Swal.fire('Error', 'ไม่สามารถบันทึกได้ กรุณาลองใหม่', 'error');
            }
        }
    }

    // ฟังก์ชันเดิมสำหรับหน้าอื่นๆ
    function renderStudentList(container) {
        let html = '<div class="row g-2 px-2">';
        allStudents.forEach(s => {
            const v = Object.values(s);
            const img = v[18] && v[18].startsWith('data') ? `<img src="${v[18]}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : '👤';
            html += `<div class="col-6"><div class="student-item text-center">
                <div style="width:60px;height:60px;margin:0 auto 10px;background:#eee;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden">${img}</div>
                <div class="fw-bold small">${v[2]}</div>
                <div class="text-orange small">เหลือ ${v[16] || 0} ชม.</div>
            </div></div>`;
        });
        container.innerHTML = html + '</div>';
    }

    function renderScheduleGrid(container) {
        const timeSlots = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00'];
        const days = ['จันทร์', 'อังคาร', 'พฤหัสบดี', 'ศุกร์', 'เสาร์', 'อาทิตย์'];
        let html = '<div class="table-responsive"><table class="table table-bordered table-timetable"><thead><tr><th class="th-day">วัน/เวลา</th>';
        timeSlots.forEach(t => html += `<th class="text-center bg-orange text-white" style="font-size:0.8rem">${t}</th>`);
        html += '</tr></thead><tbody>';
        days.forEach(day => {
            html += `<tr><td class="th-day">วัน${day}</td>`;
            timeSlots.forEach(slot => {
                const matches = allStudents.filter(s => Object.values(s)[14].includes(day) && Object.values(s)[15].startsWith(slot.split(':')[0]));
                html += '<td>';
                matches.forEach(m => {
                    const v = Object.values(m);
                    const teacher = allTeachers.find(t => Object.values(t)[0] == v[19]);
                    html += `<div class="class-box"><span class="fw-bold d-block" style="font-size:0.8rem">${v[2]}</span><small style="font-size:0.65rem">ครู${teacher?Object.values(teacher)[2]:'?'}</small></div>`;
                });
                html += '</td>';
            });
            html += '</tr>';
        });
        container.innerHTML = html + '</tbody></table></div>';
    }

    loadData();
</script>
</body>
</html>
