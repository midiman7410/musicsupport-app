<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Admin - New Schedule V 0.0.063</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --main-orange: #ff6600; --soft-orange: #fff5ed; --card-border: #ffd1b3; }
        body { background: #fdfdfd; padding: 10px; font-family: 'Sarabun', sans-serif; padding-bottom: 60px; }
        
        /* Version Tag */
        .v-badge { position: fixed; top: 10px; right: 10px; background: var(--main-orange); color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.65rem; z-index: 9999; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* Tabs Navigation */
        .nav-pills { justify-content: center; background: #eee; border-radius: 50px; padding: 5px; margin: 15px 0; }
        .nav-link { border-radius: 40px !important; color: #555; font-weight: 600; font-size: 0.9rem; }
        .nav-link.active { background-color: var(--main-orange) !important; color: white !important; }

        /* --- New Schedule Layout (Card Style) --- */
        .day-group { margin-bottom: 25px; }
        .day-header { font-size: 1.2rem; font-weight: bold; color: var(--main-orange); border-bottom: 2px solid var(--main-orange); margin-bottom: 12px; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .day-label { display: flex; align-items: center; gap: 8px; }
        .count-pill { font-size: 0.75rem; background: #eee; color: #666; padding: 2px 10px; border-radius: 10px; font-weight: normal; }

        .schedule-list { display: flex; flex-direction: column; gap: 10px; }
        .class-card { background: white; border: 1px solid var(--card-border); border-left: 5px solid var(--main-orange); border-radius: 10px; padding: 12px; display: flex; align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
        
        .time-part { min-width: 70px; text-align: center; border-right: 1px solid #eee; padding-right: 10px; }
        .time-val { font-weight: bold; color: var(--main-orange); font-size: 1.1rem; display: block; }
        .time-label { font-size: 0.6rem; color: #999; text-transform: uppercase; }

        .info-part { flex-grow: 1; padding-left: 15px; }
        .std-name { font-weight: 600; color: #333; font-size: 1.05rem; display: block; }
        .subject-info { font-size: 0.8rem; color: #777; margin-top: 2px; }
        .teacher-name { color: var(--main-orange); font-weight: 600; }

        .stat-part { text-align: center; background: var(--soft-orange); padding: 5px 10px; border-radius: 8px; min-width: 60px; }
        .rem-val { font-weight: bold; color: #e67e22; font-size: 1rem; display: block; line-height: 1; }
        .rem-label { font-size: 0.6rem; color: #a05a2c; }

        /* Student Grid */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 10px; }
        .std-card { background: white; border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #eee; }
        .std-photo { width: 65px; height: 65px; background: #f5f5f5; border-radius: 50%; margin: 0 auto 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .std-photo img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="v-badge">V 0.0.063</div>

<div class="container-fluid">
    <h3 class="text-center fw-bold mt-3" style="color:var(--main-orange)">🟠 MUSIC SCHOOL</h3>
    
    <ul class="nav nav-pills nav-fill">
        <li class="nav-item"><button id="navStudent" class="nav-link active" onclick="switchPage('student')">นักเรียน</button></li>
        <li class="nav-item"><button id="navTeacher" class="nav-link" onclick="switchPage('teacher')">คุณครู</button></li>
        <li class="nav-item"><button id="navSchedule" class="nav-link" onclick="switchPage('schedule')">ตารางเรียน</button></li>
    </ul>

    <div id="searchBox" class="mb-3"><input type="text" id="searchInput" class="form-control" placeholder="🔍 ค้นหา..." onkeyup="handleSearch()" style="border-radius: 15px; border: 1px solid #ccc;"></div>
    
    <div id="displayArea"><div class="text-center p-5 text-muted">กำลังโหลดข้อมูล...</div></div>
</div>

<script>
    const apiUrl = 'https://script.google.com/macros/s/AKfycbwNLW9rMRdeq82LaLCrP5PCyxj0Sz-GFcnD1hs4ZG6AviyV7NpH6mWNIBLGN7NVCEvf/exec';
    let allStudents = [], allTeachers = [], currentPage = 'student';

    async function loadData() {
        try {
            const res = await fetch(`${apiUrl}?t=${new Date().getTime()}`, { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            allStudents = data.students || [];
            allTeachers = data.teachers || [];
            renderDisplay();
        } catch (e) { document.getElementById('displayArea').innerHTML = 'ไม่สามารถเชื่อมต่อข้อมูลได้'; }
    }

    function renderDisplay(data = null) {
        const area = document.getElementById('displayArea');
        const listData = data || (currentPage === 'student' ? allStudents : allTeachers);
        
        // บังคับล้างค่าหน้าจอทุกครั้งที่เปลี่ยนหน้า
        area.innerHTML = '';

        if (currentPage === 'schedule') {
            renderScheduleCards(area);
            return;
        }

        let html = '<div class="main-grid">';
        listData.forEach(item => {
            const v = Object.values(item); const id = v[0];
            if (currentPage === 'student') {
                const img = v[18] && v[18].toString().startsWith('data:image') ? `<img src="${v[18]}">` : '👤';
                html += `<div class="std-card">
                    <div class="std-photo">${img}</div>
                    <div class="fw-bold" style="font-size:0.9rem;">${v[2]}</div>
                    <div class="small text-muted mb-2">เหลือ ${v[16] || 0} ชม.</div>
                    <label class="btn btn-outline-warning btn-sm w-100" style="font-size:0.7rem; border-radius:8px;">📷 อัปรูป<input type="file" hidden accept="image/*" onchange="handleUpload(this, '${id}')"></label>
                </div>`;
            } else {
                html += `<div class="std-card"><b>${v[2]}</b><br><small class="text-muted">ID: ${id}</small></div>`;
            }
        });
        area.innerHTML = html + '</div>';
    }

    function renderScheduleCards(container) {
        // ตัดวันพุธออกถาวร
        const days = ['จันทร์', 'อังคาร', 'พฤหัสบดี', 'ศุกร์', 'เสาร์', 'อาทิตย์'];
        let fullHtml = '';

        days.forEach(day => {
            const list = allStudents.filter(s => (Object.values(s)[14] || "").includes(day));
            // เรียงเวลา
            list.sort((a, b) => (Object.values(a)[15] || "").toString().localeCompare((Object.values(b)[15] || "").toString()));

            let dayHtml = `
            <div class="day-group">
                <div class="day-header">
                    <div class="day-label"><span>วัน${day}</span></div>
                    <span class="count-pill">${list.length} คลาส</span>
                </div>
                <div class="schedule-list">
                    ${list.length > 0 ? list.map(s => {
                        const v = Object.values(s);
                        const t = allTeachers.find(tc => Object.values(tc)[0] == v[19]);
                        return `
                        <div class="class-card">
                            <div class="time-part">
                                <span class="time-val">${v[15] || '--:--'}</span>
                                <span class="time-label">เริ่มเรียน</span>
                            </div>
                            <div class="info-part">
                                <span class="std-name">${v[2]}</span>
                                <span class="subject-info">🎸 ${v[8]} - <span class="teacher-name">ครู${t ? Object.values(t)[2] : '?'}</span></span>
                            </div>
                            <div class="stat-part">
                                <span class="rem-val">${v[16] || 0}</span>
                                <span class="rem-label">ชม.เหลือ</span>
                            </div>
                        </div>`;
                    }).join('') : '<div class="text-center p-3 text-muted small">ไม่มีการเรียนการสอน</div>'}
                </div>
            </div>`;
            fullHtml += dayHtml;
        });
        container.innerHTML = fullHtml;
    }

    function switchPage(p) {
        currentPage = p;
        document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav${p.charAt(0).toUpperCase() + p.slice(1)}`).classList.add('active');
        document.getElementById('searchBox').style.display = (p === 'schedule') ? 'none' : 'block';
        renderDisplay();
    }

    function handleSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const data = (currentPage === 'student' ? allStudents : allTeachers);
        renderDisplay(data.filter(s => Object.values(s).join(' ').toLowerCase().includes(term)));
    }

    async function handleUpload(input, id) {
        const file = input.files[0]; if (!file) return;
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas'); canvas.width = 500; canvas.height = 500;
                const ctx = canvas.getContext('2d');
                let sX = 0, sY = 0, sW = img.width, sH = img.height;
                if (img.width > img.height) { sW = img.height; sX = (img.width-img.height)/2; } else { sH = img.width; sY = (img.height-img.width)/2; }
                ctx.drawImage(img, sX, sY, sW, sH, 0, 0, 500, 500);
                const base64 = canvas.toDataURL('image/jpeg', 0.5);
                try {
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'uploadImage', studentId: id.toString(), base64: base64 })});
                    Swal.fire({ icon: 'success', title: 'อัปโหลดสำเร็จ', timer: 1000, showConfirmButton: false });
                    loadData();
                } catch (err) { Swal.fire('Error', 'ลองใหม่ครับ', 'error'); }
            };
        };
    }
    loadData();
</script>
</body>
</html>
