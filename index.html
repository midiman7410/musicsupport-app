<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Support - Student Info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 20px; font-family: 'Sarabun', sans-serif; }
        .student-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: none; }
        .header-title { font-weight: bold; color: #333; margin-bottom: 25px; text-align: center; }
        .modal-content { border-radius: 15px; border: none; }
        .info-label { font-weight: bold; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header-title">🎸 ข้อมูลนักเรียนทั้งหมด</h2>
        <div id="studentList" class="text-center">กำลังโหลดข้อมูล...</div>
    </div>

    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">📄 รายละเอียดนักเรียน</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const apiUrl = 'https://script.google.com/macros/s/AKfycbxuozyH7Jtntzpd1CAu_kOlefKPbdtSWsl7CXi5cG9FZhvp03kr6JHdv8iAZhZ_6-7o/exec';
        let allStudents = [];

        async function loadData() {
            const studentListDiv = document.getElementById('studentList');
            try {
                const response = await fetch(apiUrl, { method: 'GET', redirect: 'follow' });
                const fullData = await response.json();
                allStudents = fullData.students; 
                
                if (!allStudents || allStudents.length === 0) {
                    studentListDiv.innerHTML = '<p>ไม่พบข้อมูลนักเรียน</p>';
                    return;
                }

                let html = '';
                allStudents.forEach((s, index) => {
                    html += `
                        <div class="student-card d-flex justify-content-between align-items-center">
                            <div class="text-start">
                                <h5 class="mb-0" style="font-weight: 600;">${s['ชื่อเล่น'] || 'ไม่ระบุชื่อ'}</h5>
                                <small class="text-muted">รหัส: ${s['รหัสนักเรียน'] || '-'}</small>
                            </div>
                            <button class="btn btn-info btn-sm text-white" onclick="showDetail(${index})">ดูข้อมูล</button>
                        </div>`;
                });
                studentListDiv.innerHTML = html;
            } catch (error) {
                studentListDiv.innerHTML = '<div class="alert alert-danger">❌ โหลดข้อมูลไม่สำเร็จ</div>';
            }
        }

        function showDetail(index) {
            const s = allStudents[index];
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <div class="mb-2"><span class="info-label">ชื่อเล่น:</span> ${s['ชื่อเล่น'] || '-'}</div>
                <div class="mb-2"><span class="info-label">ชื่อเต็ม:</span> ${s['ชื่อ-นามสกุล'] || '-'}</div>
                <div class="mb-2"><span class="info-label">วิชา:</span> ${s['วิชา'] || '-'}</div>
                <hr>
                <div class="mb-2 text-primary"><span class="info-label">ชม. คงเหลือ:</span> ${s['ชั่วโมงคงเหลือ'] || '0'} ชม.</div>
                <div class="mb-2 text-danger"><span class="info-label">ลาไปแล้ว:</span> ${s['จำนวนการลา'] || '0'} ครั้ง</div>
            `;
            
            const myModal = new bootstrap.Modal(document.getElementById('infoModal'));
            myModal.show();
        }

        loadData();
    </script>
</body>
</html>
