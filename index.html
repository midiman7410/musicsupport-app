<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Support - รายชื่อนักเรียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 20px; font-family: sans-serif; }
        .student-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: none; }
        .header-title { font-weight: bold; color: #333; margin-bottom: 25px; text-align: center; }
        .btn-checkin { background-color: #007bff; color: white; border-radius: 8px; border: none; padding: 5px 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header-title">🎸 รายชื่อนักเรียนทั้งหมด</h2>
        
        <div id="studentList" class="text-center">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">กำลังโหลดข้อมูลนักเรียน...</p>
        </div>
    </div>

    <script>
        // 1. ตรวจสอบให้แน่ใจว่า URL นี้มาจากหน้า Apps Script ที่คุณ Deploy ล่าสุด
        const apiUrl = 'https://script.google.com/macros/s/AKfycbzWesxkO9KxF-2O-6hUKAmU5Z4kHabbuwkr-gd6JPX0N8r3LjD3modqwZmseSfBOic/exec';

        async function loadData() {
            try {
                const response = await fetch(apiUrl);
                const fullData = await response.json(); // รับข้อมูลมาทั้งก้อน {students: [], teachers: []}
                
                // 2. แก้จุดนี้: บอกให้เครื่องหยิบเฉพาะก้อน 'students' มาโชว์
                const students = fullData.students; 
                
                let html = '';
                if (students && students.length > 0) {
                    students.forEach(s => {
                        // สร้างบัตรนักเรียนแต่ละคน
                        html += `
                            <div class="student-card d-flex justify-content-between align-items-center">
                                <div class="text-start">
                                    <h5 class="mb-0" style="font-weight: 600;">${s['ชื่อเล่น'] || 'ไม่ระบุชื่อ'}</h5>
                                    <small class="text-muted">รหัส: ${s['รหัสนักเรียน'] || '-'}</small>
                                    <div class="small text-primary">${s['วิชา'] || ''}</div>
                                </div>
                                <button class="btn btn-checkin btn-sm" onclick="alert('เช็คชื่อคุณ ${s['ชื่อเล่น']} เรียบร้อย')">เช็คชื่อ</button>
                            </div>`;
                    });
                } else {
                    html = '<p class="text-muted">ไม่พบข้อมูลนักเรียนในระบบ</p>';
                }
                
                document.getElementById('studentList').innerHTML = html;
            } catch (error) {
                document.getElementById('studentList').innerHTML = '<div class="alert alert-danger">❌ โหลดข้อมูลไม่สำเร็จ กรุณาเช็ค Apps Script</div>';
                console.error(error);
            }
        }

        loadData();
    </script>
</body>
</html>
