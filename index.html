<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Admin - Schedule V 0.0.058</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --school-orange: #ff6600;
            --soft-orange: #fff5ed;
            --text-dark: #333333;
        }
        body { background: #fdfdfd; padding: 15px; font-family: 'Sarabun', sans-serif; padding-bottom: 60px; }
        .header-title { font-weight: bold; color: var(--school-orange); text-align: center; margin-bottom: 20px; font-size: 1.6rem; }
        
        /* Navigation */
        .nav-pills { justify-content: center; margin-bottom: 20px; background: #f0f0f0; border-radius: 15px; padding: 5px; }
        .nav-link { border-radius: 10px !important; color: #666; font-weight: 600; font-size: 0.9rem; border: none; }
        .nav-link.active { background-color: var(--school-orange) !important; color: white !important; }
        
        /* Schedule Table Style */
        .day-section { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; margin-bottom: 20px; }
        .day-header { padding: 12px; font-weight: bold; font-size: 1.1rem; text-align: left; background: var(--school-orange); color: white; display: flex; justify-content: space-between; align-items: center; }
        .day-tag { background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; }
        
        .class-table { width: 100%; border-collapse: collapse; }
        .class-row { border-bottom: 1px solid #f2f2f2; }
        .class-row:last-child { border-bottom: none; }
        
        .time-col { width: 90px; padding: 15px 10px; background: var(--soft-orange); color: var(--school-orange); font-weight: bold; text-align: center; font-size: 0.9rem; border-right: 2px solid #fff; }
        .info-col { padding: 10px 15px; }
        .student-name { font-weight: 600; color: var(--text-dark); font-size: 1.05rem; display: block; }
        .detail-text { font-size: 0.8rem; color: #777; margin-top: 2px; }
        
        .remain-badge { float: right; background: #fff0e6; color: #ff6600; border: 1px solid #ffd1b3; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; margin-top: 5px; }

        /* General UI */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .data-card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f0f0f0; }
        .photo-slot { width: 80px; height: 80px; background: #f8f8f8; border-radius: 50%; margin: 0 auto 10px; overflow: hidden; border: 2px solid var(--soft-orange); display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="container-fluid">
    <h2 class="header-title">🟠 Music School Admin</h2>
    
    <ul class="nav nav-pills nav-fill mb-4">
        <li class="nav-item"><button id="navStudent" class="nav-link active" onclick="switchPage('student')">นักเรียน</button></li>
        <li class="nav-item"><button id="navTeacher" class="nav-link" onclick="switchPage('teacher')">คุณครู</button></li>
        <li class="nav-item"><button id="navSchedule" class="nav-link" onclick="switchPage('schedule')">ตารางเรียน</button></li>
    </ul>

    <div id="searchBox" class="mb-3"><input type="text" id="searchInput" class="form-control" placeholder="🔍 ค้นหาชื่อ..." onkeyup="handleSearch()" style="border-radius: 12px; border: 1px solid #ddd;"></div>
    
    <div id="displayArea"></div>
</div>

<script>
    const apiUrl = 'https://script.google.com/macros/s/AKfycbwNLW9rMRdeq82LaLCrP5PCyxj0Sz-GFcnD1hs4ZG6AviyV7NpH6mWNIBLGN7NVCEvf/exec';
    let allStudents = [], allTeachers = [], currentPage = 'student';

    async function loadData() {
        try {
            const res = await fetch(`${apiUrl}?t=${new Date().getTime()}`, { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            allStudents = data.students || [];
            allTeachers = data.teachers || [];
            renderDisplay();
        } catch (e) { document.getElementById('displayArea').innerHTML = 'เชื่อมต่อล้มเหลว...'; }
    }

    function renderDisplay(data = null) {
        const area = document.getElementById('displayArea');
        const listData = data || (currentPage === 'student' ? allStudents : allTeachers);
        
        if (currentPage === 'schedule') { renderScheduleTable(); return; }

        let html = '<div class="main-grid">';
        listData.forEach(item => {
            const v = Object.values(item); const id = v[0];
            if (currentPage === 'student') {
                const img = v[18] && v[18].startsWith('data:image') ? `<img src="${v[18]}">` : '👤';
                html += `<div class="data-card">
                    <div class="photo-slot">${img}</div>
                    <div class="fw-bold">${v[2] || '-'}</div>
                    <div class="small text-muted">${v[14] || '-'} ${v[15] || ''}</div>
                    <div class="mt-1"><span class="badge bg-light text-dark border">เหลือ ${v[16] || 0} ชม.</span></div>
                    <label class="btn btn-outline-warning btn-sm w-100 mt-2" style="border-radius:10px;">📷 อัปรูป<input type="file" hidden accept="image/*" onchange="handleUpload(this, '${id}')"></label>
                </div>`;
            } else {
                html += `<div class="data-card"><div class="fw-bold" style="color:var(--school-orange)">${v[2]}</div><div class="small text-muted">ID: ${id}</div></div>`;
            }
        });
        area.innerHTML = html + '</div>';
    }

    function renderScheduleTable() {
        // ตัดวันพุธออกตามคำขอ
        const days = ['จันทร์', 'อังคาร', 'พฤหัสบดี', 'ศุกร์', 'เสาร์', 'อาทิตย์'];
        let html = '';
        
        days.forEach(day => {
            const list = allStudents.filter(s => (Object.values(s)[14] || "").includes(day));
            list.sort((a, b) => (Object.values(a)[15] || "").localeCompare(Object.values(b)[15] || ""));

            html += `
            <div class="day-section">
                <div class="day-header">
                    <span>วัน${day}</span>
                    <span class="day-tag">${list.length} คลาส</span>
                </div>
                <table class="class-table">
                    ${list.length > 0 ? list.map(s => {
                        const v = Object.values(s);
                        const t = allTeachers.find(tc => Object.values(tc)[0] == v[19]);
                        return `
                        <tr class="class-row">
                            <td class="time-col">${v[15] || '--:--'}</td>
                            <td class="info-col">
                                <span class="remain-badge">${v[16] || 0} ชม.</span>
                                <span class="student-name">${v[2]}</span>
                                <span class="detail-text">🎸 ${v[8]} - ครู${t ? Object.values(t)[2] : '...'}</span>
                            </td>
                        </tr>`;
                    }).join('') : '<tr><td colspan="2" class="p-3 text-center text-muted small">ไม่มีการเรียนการสอน</td></tr>'}
                </table>
            </div>`;
        });
        document.getElementById('displayArea').innerHTML = html;
    }

    function switchPage(p) {
        currentPage = p;
        document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav${p.charAt(0).toUpperCase() + p.slice(1)}`).classList.add('active');
        document.getElementById('searchBox').style.display = (p === 'schedule') ? 'none' : 'block';
        renderDisplay();
    }

    function handleSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const data = (currentPage === 'student' ? allStudents : allTeachers);
        renderDisplay(data.filter(s => Object.values(s).join(' ').toLowerCase().includes(term)));
    }

    async function handleUpload(input, id) {
        const file = input.files[0]; if (!file) return;
        Swal.fire({ title: 'กำลังอัปโหลด...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                canvas.width = 500; canvas.height = 500;
                const ctx = canvas.getContext('2d');
                let sX = 0, sY = 0, sW = img.width, sH = img.height;
                if (img.width > img.height) { sW = img.height; sX = (img.width-img.height)/2; } else { sH = img.width; sY = (img.height-img.width)/2; }
                ctx.drawImage(img, sX, sY, sW, sH, 0, 0, 500, 500);
                const base64 = canvas.toDataURL('image/jpeg', 0.5);
                try {
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'uploadImage', studentId: id.toString(), base64: base64 })});
                    Swal.fire({ icon: 'success', title: 'บันทึกรูปแล้ว', timer: 1000, showConfirmButton: false });
                    loadData();
                } catch (err) { Swal.fire('Error', 'ลองใหม่อีกครั้ง', 'error'); }
            };
        };
    }
    loadData();
</script>
</body>
</html>
