<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Admin - Grid Table V 0.0.065</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --main-orange: #ff6600; --table-border: #dee2e6; }
        body { background: #fdfdfd; padding: 10px; font-family: 'Sarabun', sans-serif; padding-bottom: 60px; }
        
        .v-badge { position: fixed; top: 10px; right: 10px; background: var(--main-orange); color: white; padding: 2px 12px; border-radius: 20px; font-size: 0.7rem; z-index: 9999; font-weight: bold; }

        .nav-pills { justify-content: center; background: #eee; border-radius: 50px; padding: 5px; margin: 15px 0; }
        .nav-link { border-radius: 40px !important; color: #555; font-weight: 600; font-size: 0.9rem; }
        .nav-link.active { background-color: var(--main-orange) !important; color: white !important; }

        /* --- New Grid Table Style --- */
        .table-responsive { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--table-border); }
        .table-timetable { margin-bottom: 0; min-width: 800px; table-layout: fixed; }
        .table-timetable th, .table-timetable td { border: 1px solid var(--table-border); padding: 8px; vertical-align: top; text-align: center; }
        
        .th-day { width: 100px; background: #fff5ed !important; color: var(--main-orange); font-weight: bold; }
        .th-time { background: var(--main-orange) !important; color: white !important; font-size: 0.8rem; height: 50px; vertical-align: middle !important; }
        
        .class-box { background: #fff; border: 1px solid #ffccaa; border-radius: 6px; padding: 4px; margin-bottom: 4px; text-align: left; }
        .std-name-grid { font-weight: bold; font-size: 0.85rem; color: #333; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inst-tag { font-size: 0.7rem; color: #777; display: block; }
        .rem-tag { font-size: 0.7rem; color: #ff6600; font-weight: bold; border-top: 1px solid #ffe5d4; margin-top: 2px; padding-top: 2px; }

        /* Student Grid */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .std-card { background: white; border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #eee; }
        .std-photo { width: 60px; height: 60px; background: #eee; border-radius: 50%; margin: 0 auto 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .std-photo img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="v-badge">V 0.0.065</div>

<div class="container-fluid">
    <h3 class="text-center fw-bold mt-3" style="color:var(--main-orange)">🟠 MUSIC SCHOOL</h3>
    
    <ul class="nav nav-pills nav-fill">
        <li class="nav-item"><button id="navStudent" class="nav-link active" onclick="switchPage('student')">นักเรียน</button></li>
        <li class="nav-item"><button id="navTeacher" class="nav-link" onclick="switchPage('teacher')">คุณครู</button></li>
        <li class="nav-item"><button id="navSchedule" class="nav-link" onclick="switchPage('schedule')">ตารางเรียน</button></li>
    </ul>

    <div id="searchBox" class="mb-3"><input type="text" id="searchInput" class="form-control" placeholder="🔍 ค้นหาชื่อ..." onkeyup="handleSearch()" style="border-radius: 20px;"></div>
    
    <div id="displayArea"></div>
</div>

<script>
    const apiUrl = 'https://script.google.com/macros/s/AKfycbwNLW9rMRdeq82LaLCrP5PCyxj0Sz-GFcnD1hs4ZG6AviyV7NpH6mWNIBLGN7NVCEvf/exec';
    let allStudents = [], allTeachers = [], currentPage = 'student';

    async function loadData() {
        try {
            const res = await fetch(`${apiUrl}?t=${new Date().getTime()}`, { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            allStudents = data.students || [];
            allTeachers = data.teachers || [];
            renderDisplay();
        } catch (e) { document.getElementById('displayArea').innerHTML = 'โหลดข้อมูลไม่สำเร็จ'; }
    }

    function renderDisplay(data = null) {
        const area = document.getElementById('displayArea');
        const listData = data || (currentPage === 'student' ? allStudents : allTeachers);
        area.innerHTML = '';

        if (currentPage === 'schedule') {
            renderGridTable(area);
            return;
        }

        let html = '<div class="main-grid">';
        listData.forEach(item => {
            const v = Object.values(item);
            if (currentPage === 'student') {
                const img = v[18] && v[18].toString().startsWith('data:image') ? `<img src="${v[18]}">` : '👤';
                html += `<div class="std-card">
                    <div class="std-photo">${img}</div>
                    <div class="fw-bold" style="font-size:0.85rem;">${v[2]}</div>
                    <div class="small text-muted mb-1">${v[16] || 0} ชม.</div>
                    <label class="btn btn-outline-warning btn-sm w-100" style="font-size:0.65rem;">📷 อัปรูป<input type="file" hidden accept="image/*" onchange="handleUpload(this, '${v[0]}')"></label>
                </div>`;
            } else {
                html += `<div class="std-card"><b>${v[2]}</b></div>`;
            }
        });
        area.innerHTML = html + '</div>';
    }

    function renderGridTable(container) {
        // กำหนดช่วงเวลา (สามารถปรับเพิ่ม/ลดตามเวลาเรียนจริงของโรงเรียน)
        const timeSlots = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00'];
        const days = ['จันทร์', 'อังคาร', 'พฤหัสบดี', 'ศุกร์', 'เสาร์', 'อาทิตย์'];

        let html = `
        <div class="text-muted small mb-2">* เลื่อนตารางไปทางซ้าย-ขวาเพื่อดูเวลาเพิ่มเติม</div>
        <div class="table-responsive">
            <table class="table table-timetable">
                <thead>
                    <tr>
                        <th class="th-day">วัน / เวลา</th>
                        ${timeSlots.map(t => `<th class="th-time">${t}</th>`).join('')}
                    </tr>
                </thead>
                <tbody>`;

        days.forEach(day => {
            html += `<tr><td class="th-day">วัน${day}</td>`;
            timeSlots.forEach(slot => {
                // กรองหานักเรียนที่เรียนวันนี้ และมีเวลาเรียนที่ "ขึ้นต้นด้วย" เลขชั่วโมงนี้
                const matches = allStudents.filter(s => {
                    const v = Object.values(s);
                    const dayMatch = (v[14] || "").includes(day);
                    const timeMatch = (v[15] || "").startsWith(slot.split(':')[0]);
                    return dayMatch && timeMatch;
                });

                html += `<td>`;
                matches.forEach(m => {
                    const v = Object.values(m);
                    html += `
                    <div class="class-box">
                        <span class="std-name-grid">${v[2]}</span>
                        <span class="inst-tag">${v[8] || ''}</span>
                        <div class="rem-tag">เหลือ ${v[16] || 0}</div>
                    </div>`;
                });
                html += `</td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table></div>`;
        container.innerHTML = html;
    }

    function switchPage(p) {
        currentPage = p;
        document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav${p.charAt(0).toUpperCase() + p.slice(1)}`).classList.add('active');
        document.getElementById('searchBox').style.display = (p === 'schedule') ? 'none' : 'block';
        renderDisplay();
    }

    function handleSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const data = (currentPage === 'student' ? allStudents : allTeachers);
        renderDisplay(data.filter(s => Object.values(s).join(' ').toLowerCase().includes(term)));
    }

    async function handleUpload(input, id) {
        const file = input.files[0]; if (!file) return;
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas'); canvas.width = 500; canvas.height = 500;
                const ctx = canvas.getContext('2d');
                let sX = 0, sY = 0, sW = img.width, sH = img.height;
                if (img.width > img.height) { sW = img.height; sX = (img.width-img.height)/2; } else { sH = img.width; sY = (img.height-img.width)/2; }
                ctx.drawImage(img, sX, sY, sW, sH, 0, 0, 500, 500);
                const base64 = canvas.toDataURL('image/jpeg', 0.5);
                try {
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'uploadImage', studentId: id.toString(), base64: base64 })});
                    Swal.fire({ icon: 'success', title: 'สำเร็จ', timer: 1000, showConfirmButton: false });
                    loadData();
                } catch (err) { Swal.fire('Error', 'ลองใหม่ครับ', 'error'); }
            };
        };
    }
    loadData();
</script>
</body>
</html>
