<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Support - Admin V 0.0.038</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f4f7f6; padding: 20px; font-family: 'Sarabun', sans-serif; padding-bottom: 60px; }
        .header-title { font-weight: bold; color: #333; text-align: center; margin-bottom: 20px; }
        .nav-pills { justify-content: center; margin-bottom: 25px; background: #eee; border-radius: 30px; padding: 5px; max-width: 450px; margin-left: auto; margin-right: auto; }
        .nav-link { border-radius: 25px !important; color: #666; font-weight: 600; cursor: pointer; border: none; background: none; font-size: 0.9rem; }
        .nav-link.active { background-color: #007bff !important; color: white !important; box-shadow: 0 4px 10px rgba(0,123,255,0.3); }
        
        /* สไตล์ตารางเรียน */
        .schedule-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .day-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .day-header { padding: 10px; font-weight: bold; text-align: center; color: white; }
        .day-mon { background: #ffd600; color: #333; } .day-tue { background: #ff80ab; } .day-wed { background: #4caf50; }
        .day-thu { background: #ff9800; } .day-fri { background: #2196f3; } .day-sat { background: #9c27b0; } .day-sun { background: #f44336; }
        .class-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .class-item:last-child { border-bottom: none; }
        .class-time { font-weight: bold; color: #007bff; margin-right: 10px; }
        .class-info { display: flex; flex-direction: column; }
        .class-subject { font-size: 0.75rem; color: #666; }

        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .data-card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; position: relative; }
        .photo-slot { width: 80px; height: 80px; background: #eee; border-radius: 50%; margin: 0 auto 10px; overflow: hidden; border: 3px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        .version-tag { position: fixed; bottom: 10px; right: 15px; background: rgba(0,0,0,0.6); color: #fff; padding: 3px 12px; border-radius: 20px; font-size: 0.7rem; z-index: 9999; }
    </style>
</head>
<body>

<div class="version-tag">V 0.0.038</div>

<div class="container">
    <h2 class="header-title">🎸 Music Support Admin</h2>
    
    <ul class="nav nav-pills">
        <li class="nav-item"><button id="navStudent" class="nav-link active" onclick="switchPage('student')">นักเรียน</button></li>
        <li class="nav-item"><button id="navTeacher" class="nav-link" onclick="switchPage('teacher')">คุณครู</button></li>
        <li class="nav-item"><button id="navSchedule" class="nav-link" onclick="switchPage('schedule')">ตารางเรียน</button></li>
    </ul>

    <div id="searchBox" class="mb-4">
        <input type="text" id="searchInput" class="form-control" style="border-radius: 25px;" placeholder="🔍 ค้นหา..." onkeyup="handleSearch()">
    </div>

    <div id="displayArea">
        <div class="text-center mt-5">กำลังโหลดข้อมูล...</div>
    </div>
</div>

<script>
    const apiUrl = 'https://script.google.com/macros/s/AKfycby0JWsd9ETsAlt81Aiw66Cb7Jha6c1XRiJjv80XOKVneXqiY0LxT93pgHBY7hwyoCOO/exec';
    let allStudents = [];
    let currentPage = 'student';

    async function loadData() {
        try {
            const res = await fetch(apiUrl, { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            allStudents = data.students || [];
            renderDisplay();
        } catch (e) { document.getElementById('displayArea').innerHTML = 'เกิดข้อผิดพลาด'; }
    }

    function switchPage(page) {
        currentPage = page;
        document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
        if(page === 'student') document.getElementById('navStudent').classList.add('active');
        if(page === 'teacher') document.getElementById('navTeacher').classList.add('active');
        if(page === 'schedule') document.getElementById('navSchedule').classList.add('active');
        
        document.getElementById('searchBox').style.display = (page === 'schedule') ? 'none' : 'block';
        renderDisplay();
    }

    function renderDisplay() {
        const area = document.getElementById('displayArea');
        if (currentPage === 'student') {
            let html = '<div class="main-grid">';
            allStudents.forEach(s => {
                const v = Object.values(s);
                let img = v.find(val => val && val.toString().startsWith('data:image')) || 'https://via.placeholder.com/80?text=👤';
                html += `<div class="data-card">
                    <div class="name-title" style="font-weight:bold;">${s['ชื่อเล่น'] || v[2]}</div>
                    <div class="photo-slot"><img src="${img}"></div>
                    <div style="font-size:0.8rem; color:#007bff;">🕒 ${v[14] || '-'} | ${v[15] || '-'}</div>
                </div>`;
            });
            area.innerHTML = html + '</div>';
        } 
        else if (currentPage === 'schedule') {
            renderSchedule();
        }
    }

    function renderSchedule() {
        const days = ['จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์', 'อาทิตย์'];
        const dayClasses = { 'จันทร์': 'day-mon', 'อังคาร': 'day-tue', 'พุธ': 'day-wed', 'พฤหัสบดี': 'day-thu', 'ศุกร์': 'day-fri', 'เสาร์': 'day-sat', 'อาทิตย์': 'day-sun' };
        
        let html = '<div class="schedule-container">';
        
        days.forEach(dayName => {
            // กรองนักเรียนที่เรียนในวันนั้นๆ (เช็คจากคอลัมน์ O หรือคอลัมน์ที่ 15)
            const studentsInDay = allStudents.filter(s => {
                const dayVal = (s['หมายเหตุ'] || Object.values(s)[14] || "").toString();
                return dayVal.includes(dayName);
            });

            // เรียงเวลาเรียน (คอลัมน์ P)
            studentsInDay.sort((a, b) => (Object.values(a)[15] || "").localeCompare(Object.values(b)[15] || ""));

            html += `
            <div class="day-card">
                <div class="day-header ${dayClasses[dayName]}">${dayName}</div>
                <div class="day-body">
                    ${studentsInDay.length > 0 ? studentsInDay.map(s => {
                        const v = Object.values(s);
                        return `
                        <div class="class-item d-flex align-items-center">
                            <div class="class-time">${v[15] || 'ไม่ระบุ'}</div>
                            <div class="class-info">
                                <strong>${s['ชื่อเล่น'] || v[2]}</strong>
                                <span class="class-subject">🎸 ${v[8] || 'วิชา'} - ครู${v[9] || 'ผู้สอน'}</span>
                            </div>
                        </div>`;
                    }).join('') : '<div class="p-3 text-muted text-center" style="font-size:0.8rem;">ไม่มีตารางเรียน</div>'}
                </div>
            </div>`;
        });

        document.getElementById('displayArea').innerHTML = html + '</div>';
    }

    function handleSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allStudents.filter(s => Object.values(s).join(' ').toLowerCase().includes(term));
        const area = document.getElementById('displayArea');
        if(currentPage === 'student') {
            // โค้ดแสดงผลที่กรองแล้ว (คล้ายด้านบน)
        }
    }

    loadData();
</script>
</body>
</html>
