<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Support - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 20px; font-family: sans-serif; }
        .student-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header-title { font-weight: bold; color: #333; margin-bottom: 25px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header-title">🎸 รายชื่อนักเรียนทั้งหมด</h2>
        <div id="studentList" class="text-center">กำลังโหลดข้อมูล...</div>
    </div>

    <script>
        // ใช้ URL เดิมที่คุณมีในหน้า Apps Script ครับ
        const apiUrl = 'https://script.google.com/macros/s/AKfycbzWesxkO9KxF-2O-6hUKAmU5Z4kHabbuwkr-gd6JPX0N8r3LjD3modqwZmseSfBOic/exec';

        async function loadData() {
            try {
                const response = await fetch(apiUrl);
                const fullData = await response.json();
                
                // ดึงเฉพาะก้อน students มาแสดง
                const students = fullData.students; 
                
                let html = '';
                students.forEach(s => {
                    html += `
                        <div class="student-card d-flex justify-content-between align-items-center">
                            <div class="text-start">
                                <h5 class="mb-0">${s['ชื่อเล่น'] || 'ไม่ระบุชื่อ'}</h5>
                                <small class="text-muted">รหัส: ${s['รหัสนักเรียน'] || '-'}</small>
                            </div>
                            <button class="btn btn-primary btn-sm" onclick="alert('เช็คชื่อสำเร็จ')">เช็คชื่อ</button>
                        </div>`;
                });
                document.getElementById('studentList').innerHTML = html;
            } catch (error) {
                document.getElementById('studentList').innerHTML = '<div class="alert alert-danger">❌ โหลดข้อมูลไม่สำเร็จ</div>';
            }
        }
        loadData();
    </script>
</body>
</html>
