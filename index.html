<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Support - Admin V 0.0.046</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f4f7f6; padding: 15px; font-family: 'Sarabun', sans-serif; padding-bottom: 60px; }
        .header-title { font-weight: bold; color: #333; text-align: center; margin-bottom: 20px; font-size: 1.5rem; }
        .nav-pills { justify-content: center; margin-bottom: 20px; background: #eee; border-radius: 30px; padding: 5px; }
        .nav-link { border-radius: 25px !important; color: #666; font-weight: 600; font-size: 0.85rem; }
        .nav-link.active { background-color: #007bff !important; color: white !important; }
        
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 12px; }
        .data-card { background: white; border-radius: 20px; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; position: relative; min-height: 310px; display: flex; flex-direction: column; }
        .photo-slot { width: 100px; height: 100px; background: #f0f0f0; border-radius: 50%; margin: 0 auto 10px; overflow: hidden; border: 3px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-row { font-size: 0.75rem; margin: 4px 0; display: flex; justify-content: space-between; padding: 5px 2px 0; border-top: 1px solid #f8f9fa; }
        .remain-tag { color: #28a745; font-weight: bold; }
        .upload-label { display: block; font-size: 0.7rem; color: #007bff; cursor: pointer; border: 1px dashed #007bff; border-radius: 12px; padding: 8px; background: #f0f7ff; margin-top: auto; }
        .progress { height: 10px; margin-top: 5px; display: none; border-radius: 10px; }
        .version-tag { position: fixed; bottom: 5px; right: 10px; background: rgba(0,0,0,0.5); color: #fff; padding: 2px 10px; border-radius: 15px; font-size: 0.6rem; }
    </style>
</head>
<body>

<div class="version-tag">V 0.0.046 (Force Update Image)</div>

<div class="container-fluid">
    <h2 class="header-title">🎸 Music Admin</h2>
    <ul class="nav nav-pills nav-fill mb-3">
        <li class="nav-item"><button id="navStudent" class="nav-link active" onclick="switchPage('student')">นักเรียน</button></li>
        <li class="nav-item"><button id="navTeacher" class="nav-link" onclick="switchPage('teacher')">ครู</button></li>
        <li class="nav-item"><button id="navSchedule" class="nav-link" onclick="switchPage('schedule')">ตาราง</button></li>
    </ul>

    <div id="searchBox" class="mb-3"><input type="text" id="searchInput" class="form-control" placeholder="🔍 ค้นหา..." onkeyup="handleSearch()" style="border-radius: 20px;"></div>
    <div id="displayArea"></div>
</div>

<script>
    const apiUrl = 'https://script.google.com/macros/s/AKfycby0JWsd9ETsAlt81Aiw66Cb7Jha6c1XRiJjv80XOKVneXqiY0LxT93pgHBY7hwyoCOO/exec';
    let allStudents = [];
    let currentPage = 'student';

    async function loadData() {
        try {
            // เพิ่มตัวแปรสุ่มเพื่อให้ Google ไม่จำค่า Cache เก่า
            const res = await fetch(`${apiUrl}?t=${new Date().getTime()}`, { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            allStudents = data.students || [];
            renderDisplay();
        } catch (e) { document.getElementById('displayArea').innerHTML = 'โหลดข้อมูลไม่สำเร็จ'; }
    }

    function renderDisplay(data = null) {
        const area = document.getElementById('displayArea');
        const listData = data || allStudents;
        if (currentPage === 'student') {
            let html = '<div class="main-grid">';
            listData.forEach(s => {
                const v = Object.values(s);
                const id = v[0];
                // เพิ่มตัวแปรต่อท้าย URL รูปภาพเพื่อบังคับให้เบราว์เซอร์โหลดรูปใหม่ (ถ้ามี URL)
                const profileImg = (s['รูปโปรไฟล์'] && s['รูปโปรไฟล์'].startsWith('data:image')) 
                                   ? s['รูปโปรไฟล์'] 
                                   : 'https://via.placeholder.com/100?text=👤';

                html += `<div class="data-card">
                    <div class="name-title">${s['ชื่อเล่น'] || v[2]}</div>
                    <div class="photo-slot"><img src="${profileImg}" id="img-${id}"></div>
                    <div style="font-size:0.75rem; color:#007bff;">🕒 ${v[14] || '-'} | ${v[15] || '-'}</div>
                    <div class="info-row"><span>คงเหลือ:</span><span class="remain-tag">${v[16] || 0} ชม.</span></div>
                    <label class="upload-label" id="label-${id}">📷 อัปรูปใหม่<input type="file" hidden accept="image/*" onchange="handleUpload(this, '${id}')"></label>
                    <div class="progress" id="progress-${id}"><div class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 100%"></div></div>
                </div>`;
            });
            area.innerHTML = html + '</div>';
        }
    }

    async function handleUpload(input, id) {
        const file = input.files[0];
        if (!file) return;

        const label = document.getElementById(`label-${id}`);
        const progress = document.getElementById(`progress-${id}`);
        const imgDisplay = document.getElementById(`img-${id}`);

        label.style.display = 'none';
        progress.style.display = 'flex';

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const targetSize = 600;
                canvas.width = targetSize;
                canvas.height = targetSize;

                let sourceX = 0, sourceY = 0, sourceWidth = img.width, sourceHeight = img.height;
                if (img.width > img.height) {
                    sourceWidth = img.height;
                    sourceX = (img.width - img.height) / 2;
                } else {
                    sourceHeight = img.width;
                    sourceY = (img.height - img.width) / 2;
                }

                ctx.drawImage(img, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, targetSize, targetSize);
                const base64 = canvas.toDataURL('image/jpeg', 0.6);

                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'uploadImage', studentId: id.toString(), base64: base64 })
                    });
                    
                    if (response.ok) {
                        // บังคับเปลี่ยนรูปที่หน้าจอทันทีเพื่อยืนยันว่าเข้าแล้ว
                        imgDisplay.src = base64;
                        Swal.fire({ icon: 'success', title: 'อัปโหลดสำเร็จ!', text: 'รูปในมือถือจะอัปเดตทันที', timer: 2000, showConfirmButton: false });
                    }
                } catch (err) {
                    Swal.fire('Error', 'การเชื่อมต่อขัดข้อง', 'error');
                } finally {
                    progress.style.display = 'none';
                    label.style.display = 'block';
                }
            };
        };
    }

    function handleSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        renderDisplay(allStudents.filter(s => Object.values(s).join(' ').toLowerCase().includes(term)));
    }
    
    loadData();
</script>
</body>
</html>
