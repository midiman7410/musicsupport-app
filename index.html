<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Support - Student Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding: 20px; font-family: 'Sarabun', sans-serif; }
        .header-title { font-weight: bold; color: #333; margin-bottom: 20px; text-align: center; }
        
        /* แถบเมนูเลือกวิชา */
        .filter-container { 
            display: flex; gap: 8px; overflow-x: auto; 
            padding-bottom: 15px; margin-bottom: 20px; white-space: nowrap;
        }
        .filter-container::-webkit-scrollbar { display: none; }
        .btn-filter { 
            background: white; border: 1px solid #ddd; border-radius: 20px; 
            padding: 6px 18px; font-size: 0.85rem; transition: 0.3s;
        }
        .btn-filter.active { background: #007bff; color: white; border-color: #007bff; }

        /* ดีไซน์การ์ดแบบสี่เหลี่ยม (Grid) */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); /* ปรับขนาดสี่เหลี่ยมตามหน้าจอ */
            gap: 15px;
        }
        .student-card { 
            background: white; border-radius: 20px; padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: none;
            text-align: center; position: relative; overflow: hidden;
        }
        
        /* ชื่อเล่นอยู่บนสุด */
        .nickname { font-size: 1.3rem; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; }
        
        /* ช่องใส่รูปภาพ */
        .photo-slot {
            width: 80px; height: 80px; background: #eee; border-radius: 50%;
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            border: 3px solid #f8f9fa; overflow: hidden;
        }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        .photo-placeholder { color: #ccc; font-size: 2rem; }

        /* ข้อมูลด้านล่าง */
        .subject-badge { 
            background: #e7f1ff; color: #007bff; font-size: 0.75rem; 
            padding: 3px 10px; border-radius: 12px; margin-bottom: 10px; display: inline-block;
        }
        .info-row { font-size: 0.8rem; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .info-label { color: #888; }
        .info-val { font-weight: 600; color: #333; }
        .val-remain { color: #28a745; }
        .val-leave { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header-title">🎸 ทำเนียบนนักเรียน</h2>
        
        <div class="filter-container" id="filterMenu">
            <button class="btn-filter active" onclick="filterStudent('all', this)">ทั้งหมด</button>
            <button class="btn-filter" onclick="filterStudent('เปียโน', this)">เปียโน</button>
            <button class="btn-filter" onclick="filterStudent('กีตาร์', this)">กีตาร์</button>
            <button class="btn-filter" onclick="filterStudent('เบส', this)">เบส</button>
            <button class="btn-filter" onclick="filterStudent('กลอง', this)">กลอง</button>
        </div>

        <div id="studentList" class="student-grid">
            <div class="text-center w-100">กำลังโหลดข้อมูล...</div>
        </div>
    </div>

    <script>
        const apiUrl = 'https://script.google.com/macros/s/AKfycbyp8CEAU2ktKnUQIDeRCT8Y5MJAIguVNcbIuEcKeI9S4Au4mm21qrgXmFWFCwL10QrJ/exec';
        let allStudents = [];

        async function loadData() {
            try {
                const response = await fetch(apiUrl, { method: 'GET', redirect: 'follow' });
                const fullData = await response.json();
                allStudents = fullData.students; 
                renderStudents(allStudents);
            } catch (error) {
                document.getElementById('studentList').innerHTML = '<p class="text-danger">❌ โหลดข้อมูลไม่สำเร็จ</p>';
            }
        }

        function renderStudents(data) {
            const listDiv = document.getElementById('studentList');
            if (!data || data.length === 0) {
                listDiv.innerHTML = '<p class="text-center w-100 mt-5">ไม่พบข้อมูล</p>';
                return;
            }

            let html = '';
            data.forEach(s => {
                html += `
                    <div class="student-card">
                        <div class="nickname">${s['ชื่อเล่น'] || 'N/A'}</div>
                        
                        <div class="photo-slot">
                            ${s['รูปโปรไฟล์'] 
                                ? `<img src="${s['รูปโปรไฟล์']}">` 
                                : `<span class="photo-placeholder">👤</span>`}
                        </div>

                        <div class="subject-badge">${s['วิชาที่ 1'] || '-'}</div>
                        
                        <div class="info-row">
                            <span class="info-label">คงเหลือ</span>
                            <span class="info-val val-remain">${s['ชั่วโมงคงเหลือ'] || 0} ชม.</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">ลาไปแล้ว</span>
                            <span class="info-val val-leave">${s['จำนวนครั้งที่ลา'] || 0} ครั้ง</span>
                        </div>
                    </div>`;
            });
            listDiv.innerHTML = html;
        }

        function filterStudent(subject, btn) {
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (subject === 'all') {
                renderStudents(allStudents);
            } else {
                renderStudents(allStudents.filter(s => s['วิชาที่ 1'] === subject));
            }
        }

        loadData();
    </script>
</body>
</html>
