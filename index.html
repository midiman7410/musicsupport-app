<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Admin - White Orange V 0.0.057</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --school-orange: #ff6600; /* สีส้มหลัก */
            --school-white: #ffffff;
            --soft-orange: #fff5ed;
            --text-dark: #333333;
        }
        body { background: #fdfdfd; padding: 15px; font-family: 'Sarabun', sans-serif; padding-bottom: 60px; color: var(--text-dark); }
        .header-title { font-weight: bold; color: var(--school-orange); text-align: center; margin-bottom: 20px; font-size: 1.6rem; }
        
        /* Navigation */
        .nav-pills { justify-content: center; margin-bottom: 20px; background: #f0f0f0; border-radius: 15px; padding: 5px; }
        .nav-link { border-radius: 10px !important; color: #666; font-weight: 600; font-size: 0.9rem; border: none; }
        .nav-link.active { background-color: var(--school-orange) !important; color: white !important; box-shadow: 0 4px 10px rgba(255,102,0,0.2); }
        
        /* Schedule Card Style (ขาว-ส้ม) */
        .day-section { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; margin-bottom: 20px; }
        .day-title { padding: 10px; font-weight: bold; font-size: 1.1rem; text-align: center; background: var(--school-orange); color: white; }
        
        .class-row { display: grid; grid-template-columns: 85px 1fr 70px; align-items: center; padding: 12px; border-bottom: 1px solid #f9f9f9; }
        .class-row:last-child { border-bottom: none; }
        
        .time-box { font-weight: bold; color: var(--school-orange); background: var(--soft-orange); padding: 4px; border-radius: 8px; text-align: center; font-size: 0.85rem; border: 1px solid #ffe0cc; }
        .student-info { padding-left: 12px; }
        .student-name { font-weight: 600; color: var(--text-dark); font-size: 1rem; }
        .subject-tag { font-size: 0.75rem; color: #888; display: block; }
        
        .remain-pill { text-align: center; background: #fff0e6; padding: 5px; border-radius: 10px; border: 1px solid #ffd1b3; }
        .remain-label { font-size: 0.6rem; color: #ff6600; display: block; line-height: 1; }
        .remain-val { font-weight: bold; color: #ff4500; font-size: 0.9rem; }

        /* Student Grid */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .data-card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f0f0f0; }
        .photo-slot { width: 80px; height: 80px; background: #f8f8f8; border-radius: 50%; margin: 0 auto 10px; overflow: hidden; border: 2px solid var(--soft-orange); }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-upload { background: var(--soft-orange); color: var(--school-orange); border: 1px solid var(--school-orange); font-size: 0.75rem; border-radius: 10px; padding: 5px; width: 100%; margin-top: 10px; }
        .version-tag { position: fixed; bottom: 5px; right: 10px; color: #ccc; font-size: 0.6rem; }
    </style>
</head>
<body>

<div class="version-tag">V 0.0.057 (White Orange Theme)</div>

<div class="container-fluid">
    <h2 class="header-title">🟠 Music School Admin</h2>
    
    <ul class="nav nav-pills nav-fill">
        <li class="nav-item"><button id="navStudent" class="nav-link active" onclick="switchPage('student')">นักเรียน</button></li>
        <li class="nav-item"><button id="navTeacher" class="nav-link" onclick="switchPage('teacher')">คุณครู</button></li>
        <li class="nav-item"><button id="navSchedule" class="nav-link" onclick="switchPage('schedule')">ตารางเรียน</button></li>
    </ul>

    <div id="searchBox" class="mb-3"><input type="text" id="searchInput" class="form-control" placeholder="🔍 ค้นหาชื่อ..." onkeyup="handleSearch()" style="border-radius: 12px; border: 1px solid #ddd;"></div>
    
    <div id="displayArea"></div>
</div>

<script>
    const apiUrl = 'https://script.google.com/macros/s/AKfycbwNLW9rMRdeq82LaLCrP5PCyxj0Sz-GFcnD1hs4ZG6AviyV7NpH6mWNIBLGN7NVCEvf/exec';
    let allStudents = [], allTeachers = [], currentPage = 'student';

    async function loadData() {
        try {
            const res = await fetch(`${apiUrl}?t=${new Date().getTime()}`, { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            allStudents = data.students || [];
            allTeachers = data.teachers || [];
            renderDisplay();
        } catch (e) { document.getElementById('displayArea').innerHTML = 'โหลดไม่สำเร็จ...'; }
    }

    function renderDisplay(data = null) {
        const area = document.getElementById('displayArea');
        const listData = data || (currentPage === 'student' ? allStudents : allTeachers);
        
        if (currentPage === 'schedule') { renderSchedule(); return; }

        let html = '<div class="main-grid">';
        listData.forEach(item => {
            const v = Object.values(item); const id = v[0];
            if (currentPage === 'student') {
                const img = v[18] && v[18].startsWith('data:image') ? `<img src="${v[18]}">` : '👤';
                html += `<div class="data-card">
                    <div class="photo-slot d-flex align-items-center justify-content-center">${img}</div>
                    <div class="fw-bold">${v[2] || '-'}</div>
                    <div class="small text-muted">${v[14] || '-'} ${v[15] || ''}</div>
                    <div class="mt-1"><span class="badge bg-light text-dark border">เหลือ ${v[16] || 0} ชม.</span></div>
                    <label class="btn-upload btn">📷 อัปรูป<input type="file" hidden accept="image/*" onchange="handleUpload(this, '${id}')"></label>
                </div>`;
            } else {
                html += `<div class="data-card"><div class="fw-bold text-orange">${v[2]}</div><div class="small text-muted">ID: ${id}</div></div>`;
            }
        });
        area.innerHTML = html + '</div>';
    }

    function renderSchedule() {
        const days = ['จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์', 'อาทิตย์'];
        let html = '';
        days.forEach(day => {
            const list = allStudents.filter(s => (Object.values(s)[14] || "").includes(day));
            list.sort((a, b) => (Object.values(a)[15] || "").localeCompare(Object.values(b)[15] || ""));

            html += `
            <div class="day-section">
                <div class="day-title">${day}</div>
                ${list.length > 0 ? list.map(s => {
                    const v = Object.values(s);
                    const t = allTeachers.find(tc => Object.values(tc)[0] == v[19]);
                    return `
                    <div class="class-row">
                        <div class="time-box">${v[15] || '--:--'}</div>
                        <div class="student-info">
                            <div class="student-name">${v[2]}</div>
                            <span class="subject-tag">🎸 ${v[8]} - ครู${t ? Object.values(t)[2] : '...'}</span>
                        </div>
                        <div class="remain-pill">
                            <span class="remain-label">คงเหลือ</span>
                            <span class="remain-val">${v[16] || 0}</span>
                        </div>
                    </div>`;
                }).join('') : '<div class="p-3 text-center text-muted small">ไม่มีข้อมูลเรียน</div>'}
            </div>`;
        });
        document.getElementById('displayArea').innerHTML = html;
    }

    function switchPage(p) {
        currentPage = p;
        document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav${p.charAt(0).toUpperCase() + p.slice(1)}`).classList.add('active');
        document.getElementById('searchBox').style.display = (p === 'schedule') ? 'none' : 'block';
        renderDisplay();
    }

    function handleSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const data = (currentPage === 'student' ? allStudents : allTeachers);
        renderDisplay(data.filter(s => Object.values(s).join(' ').toLowerCase().includes(term)));
    }

    async function handleUpload(input, id) {
        const file = input.files[0]; if (!file) return;
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                canvas.width = 500; canvas.height = 500;
                const ctx = canvas.getContext('2d');
                let sX = 0, sY = 0, sW = img.width, sH = img.height;
                if (img.width > img.height) { sW = img.height; sX = (img.width-img.height)/2; } else { sH = img.width; sY = (img.height-img.width)/2; }
                ctx.drawImage(img, sX, sY, sW, sH, 0, 0, 500, 500);
                const base64 = canvas.toDataURL('image/jpeg', 0.5);
                try {
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'uploadImage', studentId: id.toString(), base64: base64 })});
                    Swal.fire({ icon: 'success', title: 'อัปรูปเรียบร้อย', timer: 1000, showConfirmButton: false });
                    loadData();
                } catch (err) { Swal.fire('Error', 'ลองใหม่ครับ', 'error'); }
            };
        };
    }
    loadData();
</script>
</body>
</html>
