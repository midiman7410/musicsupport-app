<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Support - Admin V 0.0.049</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f4f7f6; padding: 15px; font-family: 'Sarabun', sans-serif; padding-bottom: 60px; }
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .data-card { background: white; border-radius: 20px; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; display: flex; flex-direction: column; min-height: 320px; }
        
        /* สไตล์สำหรับกรอบรูป */
        .photo-slot { width: 90px; height: 90px; background: #e9ecef; border-radius: 50%; margin: 0 auto 10px; overflow: hidden; border: 3px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        /* สไตล์สำหรับ Icon กรณีไม่มีรูป */
        .default-icon { width: 50px; height: 50px; fill: #adb5bd; }

        .upload-label { display: block; font-size: 0.7rem; color: #007bff; cursor: pointer; border: 1px dashed #007bff; border-radius: 12px; padding: 8px; background: #f0f7ff; margin-top: auto; }
        .progress { height: 10px; margin-top: 5px; display: none; border-radius: 10px; }
        .version-tag { position: fixed; bottom: 5px; right: 10px; background: rgba(0,0,0,0.5); color: #fff; padding: 2px 10px; border-radius: 15px; font-size: 0.6rem; }
    </style>
</head>
<body>

<div class="version-tag">V 0.0.049 (Internal Icon - No External Pull)</div>

<div class="container-fluid">
    <h2 class="text-center mt-3 mb-4">🎸 Music Admin</h2>
    <div id="searchBox" class="mb-3"><input type="text" id="searchInput" class="form-control" placeholder="🔍 ค้นชื่อเล่น..." onkeyup="handleSearch()" style="border-radius: 20px;"></div>
    <div id="displayArea"><div class="text-center mt-5">กำลังโหลดข้อมูล...</div></div>
</div>

<script>
    const apiUrl = 'https://script.google.com/macros/s/AKfycby0JWsd9ETsAlt81Aiw66Cb7Jha6c1XRiJjv80XOKVneXqiY0LxT93pgHBY7hwyoCOO/exec';
    let allStudents = [];

    // SVG Icon รูปคน สำหรับใช้ภายใน ไม่ต้องดึงจากเว็บอื่น
    const personIcon = `<svg class="default-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;

    async function loadData() {
        try {
            const res = await fetch(`${apiUrl}?t=${new Date().getTime()}`, { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            allStudents = data.students || [];
            renderDisplay();
        } catch (e) { document.getElementById('displayArea').innerHTML = 'โหลดข้อมูลไม่สำเร็จ'; }
    }

    function renderDisplay(data = null) {
        const area = document.getElementById('displayArea');
        const listData = data || allStudents;
        let html = '<div class="main-grid">';
        listData.forEach(s => {
            const v = Object.values(s);
            const id = v[0];
            const rawImg = v[18]; // คอลัมน์ S
            
            // ตรวจสอบว่ามีข้อมูล Base64 หรือไม่
            const hasPhoto = rawImg && rawImg.toString().startsWith('data:image');
            const photoContent = hasPhoto ? `<img src="${rawImg}" id="img-${id}">` : `<div id="img-box-${id}">${personIcon}</div>`;
            
            html += `<div class="data-card">
                <div class="fw-bold mb-1">${v[2] || 'ไม่มีชื่อ'}</div>
                <div class="photo-slot" id="slot-${id}">${photoContent}</div>
                <div class="small text-muted mb-1">🕒 ${v[14] || '-'} | ${v[15] || '-'}</div>
                <div class="mb-2">คงเหลือ: <span style="color:#28a745; font-weight:bold;">${v[16] || 0} ชม.</span></div>
                <label class="upload-label" id="label-${id}">📷 อัปรูปใหม่<input type="file" hidden accept="image/*" onchange="handleUpload(this, '${id}')"></label>
                <div class="progress" id="progress-${id}"><div class="progress-bar progress-bar-striped progress-bar-animated bg-primary" style="width: 100%"></div></div>
            </div>`;
        });
        area.innerHTML = html + '</div>';
    }

    async function handleUpload(input, id) {
        const file = input.files[0];
        if (!file) return;

        const label = document.getElementById(`label-${id}`);
        const progress = document.getElementById(`progress-${id}`);
        const slot = document.getElementById(`slot-${id}`);

        label.style.display = 'none';
        progress.style.display = 'flex';

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const targetSize = 600;
                canvas.width = targetSize; canvas.height = targetSize;

                let sourceX = 0, sourceY = 0, sourceWidth = img.width, sourceHeight = img.height;
                if (img.width > img.height) {
                    sourceWidth = img.height; sourceX = (img.width - img.height) / 2;
                } else {
                    sourceHeight = img.width; sourceY = (img.height - img.width) / 2;
                }

                ctx.drawImage(img, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, targetSize, targetSize);
                const base64 = canvas.toDataURL('image/jpeg', 0.6);

                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'uploadImage', studentId: id.toString(), base64: base64 })
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        // เปลี่ยนจาก Icon เป็นรูปที่เพิ่งอัปโหลดทันที
                        slot.innerHTML = `<img src="${base64}" id="img-${id}">`;
                        Swal.fire({ icon: 'success', title: 'อัปโหลดสำเร็จ', timer: 1000, showConfirmButton: false });
                    }
                } catch (err) {
                    Swal.fire('Error', 'การเชื่อมต่อขัดข้อง', 'error');
                } finally {
                    progress.style.display = 'none'; label.style.display = 'block';
                }
            };
        };
    }

    function handleSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        renderDisplay(allStudents.filter(s => Object.values(s).join(' ').toLowerCase().includes(term)));
    }
    loadData();
</script>
</body>
</html>
