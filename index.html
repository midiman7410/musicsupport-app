<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Support - Student List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 20px; font-family: 'Sarabun', sans-serif; }
        .student-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: none; }
        .header-title { font-weight: bold; color: #333; margin-bottom: 25px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="header-title">🎸 รายชื่อนักเรียนทั้งหมด</h2>
        <div id="studentList" class="text-center">กำลังโหลดข้อมูล...</div>
    </div>

    <script>
        // URL จากการ Deploy ครั้งที่ 9
        const apiUrl = 'https://script.google.com/macros/s/AKfycbzBVV0MjFxERUNBzJi5rOjuO3RBG1IqhStQq1yMld-1oCGPfbd9dz4vTjZIQjsuUd0Z/exec';

        async function loadData() {
            const studentListDiv = document.getElementById('studentList');
            try {
                // ใช้ redirect: 'follow' เพื่อดึงข้อมูลจาก Google
                const response = await fetch(apiUrl, { method: 'GET', redirect: 'follow' });
                const fullData = await response.json();
                
                // ดึงข้อมูลจากก้อน students
                const students = fullData.students; 
                
                if (!students || students.length === 0) {
                    studentListDiv.innerHTML = '<p>ไม่พบข้อมูลนักเรียน</p>';
                    return;
                }

                let html = '';
                students.forEach(s => {
                    html += `
                        <div class="student-card d-flex justify-content-between align-items-center">
                            <div class="text-start">
                                <h5 class="mb-0" style="font-weight: 600;">${s['ชื่อเล่น'] || 'ไม่ระบุชื่อ'}</h5>
                                <small class="text-muted">รหัส: ${s['รหัสนักเรียน'] || '-'}</small>
                            </div>
                            <button class="btn btn-primary btn-sm" onclick="alert('เช็คชื่อสำเร็จ')">เช็คชื่อ</button>
                        </div>`;
                });
                studentListDiv.innerHTML = html;
            } catch (error) {
                console.error('Error:', error);
                studentListDiv.innerHTML = '<div class="alert alert-danger">❌ โหลดข้อมูลไม่สำเร็จ กรุณาเช็คการตั้งค่า Apps Script</div>';
            }
        }

        // เรียกใช้งานฟังก์ชัน
        loadData();
    </script>
</body>
</html>
