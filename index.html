<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Admin - V 0.0.062</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --main-orange: #ff6600; --bg-light: #fdfdfd; --border-color: #ffe0cc; }
        body { background: #f8f9fa; padding: 10px; font-family: 'Sarabun', sans-serif; padding-bottom: 60px; }
        
        /* Version Tag - เด่นชัดและลอยอยู่ตลอด */
        .v-badge { 
            position: fixed; top: 10px; right: 10px; 
            background: rgba(255, 102, 0, 0.9); color: white; 
            padding: 2px 10px; border-radius: 20px; 
            font-size: 0.65rem; z-index: 9999; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Menu Tabs */
        .nav-pills { justify-content: center; background: #eee; border-radius: 50px; padding: 5px; margin-bottom: 20px; margin-top: 10px; }
        .nav-link { border-radius: 40px !important; color: #555; font-weight: 600; font-size: 0.9rem; }
        .nav-link.active { background-color: var(--main-orange) !important; color: white !important; }

        /* Schedule Layout */
        .day-group { margin-bottom: 20px; }
        .day-banner { background: var(--main-orange); color: white; padding: 8px 15px; border-radius: 12px 12px 0 0; font-weight: bold; display: flex; justify-content: space-between; }
        .slot-container { background: white; border-radius: 0 0 12px 12px; border: 1px solid var(--border-color); border-top: none; }
        .slot-item { display: flex; border-bottom: 1px solid #f9f9f9; padding: 10px; align-items: center; }
        .slot-time { min-width: 75px; text-align: center; }
        .time-start { font-weight: bold; color: var(--main-orange); font-size: 1rem; display: block; }
        .slot-info { flex-grow: 1; padding-left: 12px; border-left: 2px solid var(--border-color); margin-left: 5px; }
        .std-name { font-weight: 600; color: #333; font-size: 1rem; display: block; }
        .class-detail { font-size: 0.75rem; color: #666; background: #fff5ed; padding: 1px 6px; border-radius: 4px; }
        .slot-stat { min-width: 50px; text-align: center; }
        .hour-rem { font-weight: bold; color: #e67e22; font-size: 0.9rem; display: block; }
        .hour-unit { font-size: 0.6rem; color: #999; }

        /* Student Card */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .std-card { background: white; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #eee; }
        .std-photo { width: 70px; height: 70px; background: #f0f0f0; border-radius: 50%; margin: 0 auto 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .std-photo img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="v-badge">V 0.0.062</div>

<div class="container-fluid">
    <h3 class="text-center fw-bold mb-1" style="color:var(--main-orange); margin-top: 15px;">🟠 MUSIC SCHOOL</h3>
    
    <ul class="nav nav-pills nav-fill">
        <li class="nav-item"><button id="navStudent" class="nav-link active" onclick="switchPage('student')">นักเรียน</button></li>
        <li class="nav-item"><button id="navTeacher" class="nav-link" onclick="switchPage('teacher')">คุณครู</button></li>
        <li class="nav-item"><button id="navSchedule" class="nav-link" onclick="switchPage('schedule')">ตารางเรียน</button></li>
    </ul>

    <div id="searchBox" class="mb-3"><input type="text" id="searchInput" class="form-control" placeholder="🔍 ค้นหาชื่อ..." onkeyup="handleSearch()" style="border-radius: 20px; border: 1px solid #ddd;"></div>
    
    <div id="displayArea"><div class="text-center p-5 text-muted">กำลังโหลดข้อมูล...</div></div>
</div>

<script>
    const apiUrl = 'https://script.google.com/macros/s/AKfycbwNLW9rMRdeq82LaLCrP5PCyxj0Sz-GFcnD1hs4ZG6AviyV7NpH6mWNIBLGN7NVCEvf/exec';
    let allStudents = [], allTeachers = [], currentPage = 'student';

    async function loadData() {
        try {
            const res = await fetch(`${apiUrl}?t=${new Date().getTime()}`, { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            allStudents = data.students || [];
            allTeachers = data.teachers || [];
            renderDisplay();
        } catch (e) { document.getElementById('displayArea').innerHTML = 'เชื่อมต่อฐานข้อมูลล้มเหลว'; }
    }

    function renderDisplay(data = null) {
        const area = document.getElementById('displayArea');
        const listData = data || (currentPage === 'student' ? allStudents : allTeachers);
        
        if (currentPage === 'schedule') {
            renderSchedule(area);
            return;
        }

        let html = '<div class="main-grid">';
        listData.forEach(item => {
            const v = Object.values(item); const id = v[0];
            if (currentPage === 'student') {
                const img = v[18] && v[18].toString().startsWith('data:image') ? `<img src="${v[18]}">` : '👤';
                html += `<div class="std-card">
                    <div class="std-photo">${img}</div>
                    <div class="fw-bold" style="font-size:0.9rem;">${v[2]}</div>
                    <div class="small text-muted">เหลือ: <span style="color:var(--main-orange)">${v[16] || 0} ชม.</span></div>
                    <label class="btn btn-outline-warning btn-sm w-100 mt-2" style="font-size:0.7rem; border-radius:8px;">📷 อัปรูป<input type="file" hidden accept="image/*" onchange="handleUpload(this, '${id}')"></label>
                </div>`;
            } else {
                html += `<div class="std-card"><b>${v[2]}</b><br><small class="text-muted">ID: ${id}</small></div>`;
            }
        });
        area.innerHTML = html + '</div>';
    }

    function renderSchedule(container) {
        const days = ['จันทร์', 'อังคาร', 'พฤหัสบดี', 'ศุกร์', 'เสาร์', 'อาทิตย์'];
        let html = '';
        days.forEach(day => {
            const list = allStudents.filter(s => (Object.values(s)[14] || "").includes(day));
            list.sort((a, b) => (Object.values(a)[15] || "").toString().localeCompare((Object.values(b)[15] || "").toString()));

            html += `
            <div class="day-group">
                <div class="day-banner"><span>วัน${day}</span><span style="font-size:0.8rem; font-weight:normal;">${list.length} คลาส</span></div>
                <div class="slot-container">
                    ${list.length > 0 ? list.map(s => {
                        const v = Object.values(s);
                        const t = allTeachers.find(tc => Object.values(tc)[0] == v[19]);
                        return `
                        <div class="slot-item">
                            <div class="slot-time"><span class="time-start">${v[15] || '--:--'}</span></div>
                            <div class="slot-info">
                                <span class="std-name">${v[2]}</span>
                                <span class="class-detail">🎸 ${v[8]} - ครู${t ? Object.values(t)[2] : '?'}</span>
                            </div>
                            <div class="slot-stat">
                                <span class="hour-rem">${v[16] || 0}</span>
                                <span class="hour-unit">ชม.</span>
                            </div>
                        </div>`;
                    }).join('') : '<div class="p-3 text-center text-muted small">ไม่มีคลาส</div>'}
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }

    function switchPage(p) {
        currentPage = p;
        document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav${p.charAt(0).toUpperCase() + p.slice(1)}`).classList.add('active');
        document.getElementById('searchBox').style.display = (p === 'schedule') ? 'none' : 'block';
        renderDisplay();
    }

    function handleSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const data = (currentPage === 'student' ? allStudents : allTeachers);
        renderDisplay(data.filter(s => Object.values(s).join(' ').toLowerCase().includes(term)));
    }

    async function handleUpload(input, id) {
        const file = input.files[0]; if (!file) return;
        Swal.fire({ title: 'กำลังบันทึกรูป...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas'); canvas.width = 500; canvas.height = 500;
                const ctx = canvas.getContext('2d');
                let sX = 0, sY = 0, sW = img.width, sH = img.height;
                if (img.width > img.height) { sW = img.height; sX = (img.width-img.height)/2; } else { sH = img.width; sY = (img.height-img.width)/2; }
                ctx.drawImage(img, sX, sY, sW, sH, 0, 0, 500, 500);
                const base64 = canvas.toDataURL('image/jpeg', 0.5);
                try {
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'uploadImage', studentId: id.toString(), base64: base64 })});
                    Swal.fire({ icon: 'success', title: 'สำเร็จ', timer: 1000, showConfirmButton: false });
                    loadData();
                } catch (err) { Swal.fire('Error', 'ลองใหม่ครับ', 'error'); }
            };
        };
    }
    loadData();
</script>
</body>
</html>
