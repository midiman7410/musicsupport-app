<script>
    /* ==========================================
       ZONE 1: SETTINGS & INITIAL DATA
       (ตั้งค่า API และตัวแปรหลัก)
    ========================================== */
    const apiUrl = 'https://script.google.com/macros/s/AKfycbwNLW9rMRdeq82LaLCrP5PCyxj0Sz-GFcnD1hs4ZG6AviyV7NpH6mWNIBLGN7NVCEvf/exec';
    let allStudents = [], allTeachers = [], currentPage = 'student';

    async function loadData() {
        try {
            const res = await fetch(`${apiUrl}?t=${new Date().getTime()}`, { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            allStudents = data.students || [];
            allTeachers = data.teachers || [];
            renderDisplay();
        } catch (e) { document.getElementById('displayArea').innerHTML = '<div class="text-center p-5">โหลดข้อมูลไม่สำเร็จ</div>'; }
    }

    /* ==========================================
       ZONE 2: MAIN DISPLAY CONTROLLER
       (ตัวควบคุมการแสดงผลหลัก)
    ========================================== */
    function renderDisplay(filteredData = null) {
        const area = document.getElementById('displayArea');
        const listData = filteredData || (currentPage === 'student' ? allStudents : allTeachers);
        area.innerHTML = '';

        if (currentPage === 'schedule') { renderFullSchedule(area); return; }
        if (currentPage === 'teacher') { renderTeacherList(area); return; }

        renderStudentList(area, listData); // เรียกใช้ฟังก์ชันโซน 3
    }

    function switchPage(p) {
        currentPage = p;
        document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav${p.charAt(0).toUpperCase() + p.slice(1)}`).classList.add('active');
        document.getElementById('searchBox').style.display = (p === 'schedule') ? 'none' : 'block';
        renderDisplay();
    }

    /* ==========================================
       ZONE 3: STUDENT PAGE (หน้าแรก/นักเรียน)
       (จัดการแสดงผลและอัปโหลดรูปนักเรียน)
    ========================================== */
    function renderStudentList(container, data) {
        let html = '<div class="main-grid">';
        data.forEach(item => {
            const v = Object.values(item);
            const img = v[18] && v[18].toString().startsWith('data') ? `<img src="${v[18]}">` : '👤';
            html += `<div class="std-card">
                <div class="std-photo">${img}</div>
                <div class="fw-bold" style="font-size:0.85rem;">${v[2]}</div>
                <div class="text-orange small">เหลือ ${v[16] || 0} ชม.</div>
                <label class="btn-up">📷 อัปรูป<input type="file" hidden accept="image/*" onchange="handleUpload(this, '${v[0]}')"></label>
            </div>`;
        });
        container.innerHTML = html + '</div>';
    }

    async function handleUpload(input, id) {
        const file = input.files[0]; if (!file) return;
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas'); canvas.width = 400; canvas.height = 400;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, 400, 400);
                const base64 = canvas.toDataURL('image/jpeg', 0.6);
                await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'uploadImage', studentId: id.toString(), base64: base64 }) });
                Swal.fire({ icon: 'success', title: 'สำเร็จ', timer: 1000 });
                loadData();
            };
        };
    }

    /* ==========================================
       ZONE 4: TEACHER PAGE (หน้าครู)
       (จัดการรายชื่อครูและระบบเช็กชื่อ)
    ========================================== */
    function renderTeacherList(container) {
        let html = '<div class="px-3">';
        allTeachers.forEach(t => {
            const v = Object.values(t);
            html += `<div class="teacher-box d-flex justify-content-between align-items-center" onclick="viewTeacherDashboard('${v[0]}', '${v[2]}')">
                <div><h6 class="fw-bold mb-0">ครู${v[2]}</h6><small class="text-muted">คลิกเพื่อเช็กชื่อนักเรียน</small></div>
                <span class="badge bg-primary rounded-pill">เด็ก ${allStudents.filter(s => Object.values(s)[19] == v[0]).length} คน</span>
            </div>`;
        });
        container.innerHTML = html + '</div>';
    }

    function viewTeacherDashboard(tId, tName) {
        const myStudents = allStudents.filter(s => Object.values(s)[19] == tId);
        let html = `<div class="px-3"><button class="btn btn-sm btn-link text-muted mb-2" onclick="switchPage('teacher')">← กลับ</button><h5 class="fw-bold">ครู${tName}</h5>`;
        myStudents.forEach(s => {
            const v = Object.values(s);
            html += `<div class="std-item-teacher">
                <div class="d-flex justify-content-between"><b>${v[2]}</b> <span class="text-orange small">เหลือ ${v[16]} ชม.</span></div>
                <div class="small text-muted mb-2">${v[8]} | ${v[14]} ${v[15]}น.</div>
                <button class="btn btn-sm btn-warning w-100 fw-bold" onclick="openCheckInModal('${v[0]}', '${v[2]}')">เช็กชื่อ / บันทึกการสอน</button>
            </div>`;
        });
        document.getElementById('displayArea').innerHTML = html + '</div>';
    }

    async function openCheckInModal(sId, sName) {
        const { value: formValues } = await Swal.fire({
            title: `บันทึกการสอน: ${sName}`,
            html: '<input id="sw-l" class="swal2-input" placeholder="สอนถึงหน้าไหน..."><input id="sw-h" class="swal2-input" placeholder="การบ้าน...">',
            showCancelButton: true, confirmButtonText: 'บันทึก & หัก 1 ชม.', confirmButtonColor: '#ff6600'
        });
        if (formValues) {
            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            await fetch(apiUrl, { method: 'POST', body: JSON.stringify({ action: 'checkIn', studentId: sId }) });
            Swal.fire({ icon: 'success', title: 'สำเร็จ', timer: 1500 });
            loadData();
        }
    }

    /* ==========================================
       ZONE 5: SCHEDULE PAGE (หน้าตารางเรียน)
       (จัดการตารางเรียน 7 วัน)
    ========================================== */
    function renderFullSchedule(container) {
        const times = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00'];
        const days = ['จันทร์', 'อังคาร', 'พฤหัสบดี', 'ศุกร์', 'เสาร์', 'อาทิตย์'];
        let h = '<div class="table-responsive"><table class="table table-timetable"><thead><tr><th class="th-day">วัน/เวลา</th>';
        times.forEach(t => h += `<th class="text-center bg-orange text-white small" style="background:#ff6600 !important; color:white;">${t}</th>`);
        h += '</tr></thead><tbody>';
        days.forEach(day => {
            h += `<tr><td class="th-day">วัน${day}</td>`;
            times.forEach(slot => {
                const matches = allStudents.filter(s => (Object.values(s)[14] || "").includes(day) && (Object.values(s)[15] || "").startsWith(slot.split(':')[0]));
                h += '<td>';
                matches.forEach(m => {
                    const v = Object.values(m);
                    const teacher = allTeachers.find(tc => Object.values(tc)[0] == v[19]);
                    h += `<div class="class-box"><b>${v[2]}</b><br><span class="txt-teacher">👤ครู${teacher ? Object.values(teacher)[2] : '?'}</span><br><span class="txt-rem">⏳เหลือ ${v[16]}</span></div>`;
                });
                h += '</td>';
            });
            h += '</tr>';
        });
        container.innerHTML = h + '</tbody></table></div>';
    }

    /* ==========================================
       ZONE 6: UTILITIES (ตัวช่วยอื่นๆ)
       (ค้นหา และการเริ่มโหลดข้อมูล)
    ========================================== */
    function handleSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const data = (currentPage === 'student' ? allStudents : allTeachers);
        renderDisplay(data.filter(s => Object.values(s).join(' ').toLowerCase().includes(term)));
    }

    loadData(); // เริ่มงาน!
</script>
