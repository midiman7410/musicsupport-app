<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ครูผู้สอน - Music Support</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        .login-box { max-width: 350px; margin: 80px auto; background: #1e1e1e; padding: 30px; border-radius: 15px; }
        .card-class { background: #2d2d2d; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 5px solid #ffcc00; }
        .btn-yellow { background: #ffcc00; color: black; font-weight: bold; border: none; }
    </style>
</head>
<body>

<div id="loginArea">
    <div class="login-box text-center shadow">
        <h4 class="mb-4">เข้าสู่ระบบครูสอน</h4>
        <input type="text" id="teacherId" class="form-control mb-3 text-center" placeholder="ใส่รหัสครู (เช่น T001)">
        <button class="btn btn-yellow w-100" onclick="handleLogin()">ตกลง</button>
        <p id="msg" class="text-danger mt-2" style="display:none;">ไม่พบรหัสนี้</p>
    </div>
</div>

<div id="mainArea" style="display:none;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 id="helloTeacher">สวัสดี</h4>
        <button class="btn btn-sm btn-outline-light" onclick="location.reload()">ออก</button>
    </div>
    <div id="scheduleList">กำลังโหลดตาราง...</div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxRuPu8O8Px_LfOiHvP3uTijX_BtmPDZUbwN48S_25sXSxxlvwbH0Z64O0cKW9wkvHu/exec';

    async function handleLogin() {
        const inputId = document.getElementById('teacherId').value.trim();
        const msg = document.getElementById('msg');
        
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            // หาข้อมูลจากคอลัมน์ "รหัสครู" ที่คุณมีในภาพ image_a92c75.png
            const info = data.find(item => item['รหัสครู'] === inputId);

            if (info) {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('mainArea').style.display = 'block';
                document.getElementById('helloTeacher').innerText = "ครู" + info['ชื่อเล่น'];
                
                renderSchedule(info['วิชาที่สอน_1'], info['วิชาที่สอน_2'], data);
            } else {
                msg.style.display = 'block';
            }
        } catch (e) { alert("Error: เชื่อมข้อมูลไม่ได้"); }
    }

    function renderSchedule(v1, v2, allData) {
        let html = '';
        // กรองนักเรียนที่เรียนวิชาตรงกับที่ครูคนนี้สอน
        const list = allData.filter(s => (s['วิชา'] === v1 || s['วิชา'] === v2) && s['ชื่อเล่น']);

        if(list.length === 0) {
            html = '<p class="text-center text-muted mt-5">ไม่มีตารางสอนในวิชานี้</p>';
        } else {
            list.forEach(s => {
                html += `
                <div class="card-class shadow-sm">
                    <div class="d-flex justify-content-between">
                        <strong>${s['ชื่อเล่น']}</strong>
                        <span class="badge bg-warning text-dark">${s['เวลาเรียน'] || 'ไม่ได้ระบุเวลา'}</span>
                    </div>
                    <div class="small text-muted mt-1">วิชา: ${s['วิชา']}</div>
                </div>`;
            });
        }
        document.getElementById('scheduleList').innerHTML = html;
    }
</script>
</body>
</html>
