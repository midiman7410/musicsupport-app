<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Support - Teachers V 0.0.017</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #f0f2f5; padding: 20px; font-family: 'Sarabun', sans-serif; }
        .header-title { font-weight: bold; color: #1a1a1a; text-align: center; margin-bottom: 25px; }
        
        .version-tag { 
            position: fixed; bottom: 10px; right: 15px; 
            background: rgba(0,0,0,0.6); color: #fff; 
            padding: 3px 12px; border-radius: 20px; 
            font-size: 0.7rem; z-index: 9999;
        }

        .teacher-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        .teacher-card { 
            background: white; 
            border-radius: 25px; 
            padding: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            transition: transform 0.2s;
            border: none;
        }

        .teacher-card:hover { transform: translateY(-5px); }

        .teacher-photo { 
            width: 100px; height: 100px; 
            background: #e9ecef; 
            border-radius: 50%; 
            margin: 0 auto 15px; 
            overflow: hidden; 
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .teacher-photo img { width: 100%; height: 100%; object-fit: cover; }

        .teacher-name { font-size: 1.25rem; font-weight: 600; color: #333; margin-bottom: 5px; }
        .teacher-subject { 
            display: inline-block;
            background: #e7f1ff; 
            color: #007bff; 
            padding: 4px 15px; 
            border-radius: 15px; 
            font-size: 0.85rem; 
            margin-bottom: 15px;
        }

        .info-box { 
            background: #f8f9fa; 
            border-radius: 15px; 
            padding: 12px; 
            font-size: 0.9rem;
            text-align: left;
        }

        .info-item { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .info-label { color: #666; }
        .info-value { font-weight: 600; color: #333; }
    </style>
</head>
<body>

<div class="version-tag">V 0.0.017 (Teachers)</div>

<div class="container">
    <h2 class="header-title">🎹 รายชื่อบุคลากรครู</h2>

    <div id="teacherList" class="teacher-grid">
        <div class="text-center w-100 mt-5">กำลังโหลดข้อมูลคุณครู...</div>
    </div>
</div>

<script>
    // ใช้ API ตัวเดียวกับหน้า Admin
    const apiUrl = 'https://script.google.com/macros/s/AKfycbx_Z2rDNcyNtZv1yH7iBGCwWRt8vOa3SaKVU_on2E_ss9tzGFGdUpTViqPKShGNPUQB/exec';

    async function loadTeachers() {
        try {
            const res = await fetch(apiUrl, { method: 'GET', redirect: 'follow' });
            const data = await res.json();
            renderTeachers(data.teachers);
        } catch (e) {
            document.getElementById('teacherList').innerHTML = '<div class="text-center w-100">ไม่สามารถโหลดข้อมูลได้</div>';
            console.error(e);
        }
    }

    function renderTeachers(teachers) {
        const listDiv = document.getElementById('teacherList');
        if (!teachers || teachers.length === 0) {
            listDiv.innerHTML = '<div class="text-center w-100">ไม่พบข้อมูลคุณครู</div>';
            return;
        }

        let html = '';
        teachers.forEach(t => {
            // ปรับชื่อ Key ตามหัวคอลัมน์ใน Sheet "Teachers" ของคุณ
            html += `
            <div class="teacher-card text-center">
                <div class="teacher-photo">
                    <img src="${t['รูปโปรไฟล์'] || 'https://via.placeholder.com/100?text=Teacher'}" alt="Teacher">
                </div>
                <div class="teacher-name">${t['ชื่อ-นามสกุล'] || t['ชื่อ'] || '-'}</div>
                <div class="teacher-subject">🎬 ${t['วิชาที่สอน'] || 'วิชาดนตรี'}</div>
                
                <div class="info-box">
                    <div class="info-item">
                        <span class="info-label">เบอร์โทรศัพท์:</span>
                        <span class="info-value">${t['เบอร์โทร'] || '-'}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">สถานะ:</span>
                        <span class="info-value text-success">● กำลังปฏิบัติงาน</span>
                    </div>
                </div>
            </div>`;
        });
        listDiv.innerHTML = html;
    }

    loadTeachers();
</script>
</body>
</html>
